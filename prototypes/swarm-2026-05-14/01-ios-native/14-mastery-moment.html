<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tectonic — Mastery moment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --brand-600:#0891b2;--brand-500:#06b6d4;--brand-100:#cffafe;--brand-50:#ecfeff;
    --surface:#fafafa;--surface-elevated:#ffffff;--surface-board:#ffffff;
    --surface-cell:#ffffff;--surface-cell-sel:#e0f7fa;
    --border:#e5e5e5;--border-cage:#a3a3a3;
    --text-primary:#0a0a0a;--text-secondary:#525252;--text-tertiary:#a3a3a3;--text-on-brand:#ffffff;
    --success:#10b981;--warning:#f59e0b;--danger:#dc2626;
    --separator:rgba(60,60,67,0.18);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --brand-600:#06b6d4;--brand-500:#22d3ee;--brand-100:#155057;--brand-50:#0e2a30;
      --surface:#0a0a0a;--surface-elevated:#171717;--surface-board:#0f1419;
      --surface-cell:#1a1f24;--surface-cell-sel:#164e5b;
      --border:#2a2a2a;--border-cage:#525252;
      --text-primary:#fafafa;--text-secondary:#a3a3a3;--text-tertiary:#737373;--text-on-brand:#0a0a0a;
      --success:#34d399;--warning:#fbbf24;--danger:#f87171;
      --separator:rgba(84,84,88,0.5);
    }
  }
  @view-transition { navigation: auto; }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,sans-serif;background:#e9eaee;color:var(--text-primary);
    -webkit-font-smoothing:antialiased;min-height:100vh;
    display:flex;align-items:center;justify-content:center;
  }
  @media (prefers-color-scheme: dark){ body{background:#000} }
  .device{
    width:390px;min-height:844px;background:var(--surface);position:relative;overflow:hidden;
    box-shadow:0 12px 40px rgba(0,0,0,0.18);border-radius:44px;
    display:flex;flex-direction:column;
  }
  .status-bar{
    height:54px;display:flex;align-items:flex-end;justify-content:space-between;
    padding:0 28px 6px;font-size:15px;font-weight:600;letter-spacing:-.01em;flex-shrink:0;
  }
  .status-bar .right{display:flex;align-items:center;gap:6px}

  /* Nav bar */
  .nav{
    height:44px;display:flex;align-items:center;justify-content:space-between;
    padding:0 8px;flex-shrink:0;
    border-bottom:0.5px solid var(--separator);
    background:var(--surface);
  }
  .nav-btn{
    background:none;border:0;font:inherit;color:var(--brand-600);
    padding:8px 12px;cursor:pointer;font-size:15px;
    display:flex;align-items:center;gap:4px;
  }
  .nav-title{
    font-size:16px;font-weight:600;letter-spacing:-.01em;
    display:flex;flex-direction:column;align-items:center;line-height:1.1;
  }
  .nav-title .t{font-size:15px;font-weight:600}
  .nav-title .s{font-size:11px;font-weight:400;color:var(--text-secondary);font-variant-numeric:tabular-nums}

  /* Status row */
  .status-row{
    display:flex;justify-content:space-around;align-items:center;
    padding:10px 16px 6px;font-size:12px;color:var(--text-secondary);
    background:var(--surface);
  }
  .status-row .item{display:flex;flex-direction:column;align-items:center;gap:2px}
  .status-row .v{font-size:15px;font-weight:500;color:var(--text-primary);font-variant-numeric:tabular-nums;font-family:'JetBrains Mono',monospace}
  .status-row .l{font-size:10px;font-weight:500;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.06em}

  /* Board */
  .board-wrap{
    padding:16px 16px 8px;display:flex;justify-content:center;
  }
  .board{
    --cell:70px;
    display:grid;grid-template-columns:repeat(5,var(--cell));grid-template-rows:repeat(5,var(--cell));
    background:var(--surface-board);
    border:2px solid var(--border-cage);
    border-radius:16px;overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
  }
  .cell{
    position:relative;
    border:1px solid var(--border);
    background:var(--surface-cell);
    display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;
    font-variant-numeric:tabular-nums;
    font-size:24px;font-weight:500;line-height:1;
    color:var(--text-primary);
  }
  .cell.empty{color:var(--text-tertiary)}
  .cell.player{color:var(--brand-600)}
  .cell .notes{
    position:absolute;inset:4px;
    display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);
    font-family:'JetBrains Mono',monospace;font-size:10px;line-height:1;
    color:var(--text-tertiary);font-variant-numeric:tabular-nums;
  }
  .cell .notes span{display:flex;align-items:center;justify-content:center}
  .cb-t{border-top:2px solid var(--border-cage)}
  .cb-r{border-right:2px solid var(--border-cage)}
  .cb-b{border-bottom:2px solid var(--border-cage)}
  .cb-l{border-left:2px solid var(--border-cage)}
  .cell.sel{background:var(--surface-cell-sel)}

  /* Technique chip — flipped to "mastered" state */
  .technique{
    margin:10px 16px 0;
    display:flex;justify-content:center;
  }
  .chip{
    display:inline-flex;align-items:center;gap:6px;
    font-size:12px;font-weight:500;
    padding:4px 10px;border-radius:999px;letter-spacing:-.01em;
  }
  .chip.t-mastered{
    color:var(--brand-600);
    background:var(--brand-50);
  }
  .chip code{
    font-family:'JetBrains Mono',monospace;font-weight:500;
  }

  /*
    The mastery moment — a pill that has just slid in from below the board.
    Positioned in the space between board and toolbar. A very soft radial brand-100
    glow sits behind it. No bouncing, no pulsing — the chip is steady.
  */
  .mastery-wrap{
    position:relative;
    margin:16px 16px 0;
    padding:14px 0 6px;
    display:flex;flex-direction:column;align-items:center;gap:6px;
  }
  .mastery-wrap::before{
    content:"";
    position:absolute;inset:-12px -24px;
    background:radial-gradient(60% 70% at 50% 50%, var(--brand-100), transparent 75%);
    opacity:.55;
    pointer-events:none;
    z-index:0;
  }
  .mastery-chip{
    position:relative;z-index:1;
    display:inline-flex;align-items:center;gap:8px;
    background:var(--brand-600);color:var(--text-on-brand);
    font-size:13px;font-weight:500;letter-spacing:-.005em;
    padding:8px 14px;border-radius:999px;
    box-shadow:0 4px 14px rgba(8,145,178,0.32), 0 1px 2px rgba(0,0,0,0.06);
  }
  .mastery-chip code{
    font-family:'JetBrains Mono',monospace;font-weight:500;
    background:rgba(255,255,255,0.18);padding:0 5px;border-radius:3px;
  }
  .mastery-chip .check{
    width:14px;height:14px;border-radius:999px;
    background:rgba(255,255,255,0.18);
    display:flex;align-items:center;justify-content:center;
  }
  .mastery-caption{
    position:relative;z-index:1;
    font-size:11px;color:var(--text-secondary);
    letter-spacing:.01em;
  }

  /* Toolbar */
  .toolbar{
    margin:12px 16px 0;
    display:flex;gap:8px;justify-content:space-between;
  }
  .tool{
    flex:1;height:40px;border-radius:8px;border:1px solid var(--border);
    background:var(--surface-elevated);color:var(--text-primary);
    display:flex;align-items:center;justify-content:center;gap:6px;
    font:inherit;font-size:13px;font-weight:500;cursor:pointer;
  }
  .tool.on{background:var(--brand-50);color:var(--brand-600);border-color:transparent}

  /* Keypad */
  .keypad{
    padding:10px 16px max(16px, env(safe-area-inset-bottom)) 16px;
    display:grid;grid-template-columns:repeat(5,1fr);gap:6px;
  }
  .key{
    height:48px;border-radius:8px;border:0;
    background:var(--surface-elevated);
    border:1px solid var(--border);
    font-family:'JetBrains Mono',monospace;
    font-variant-numeric:tabular-nums;
    font-size:20px;font-weight:500;color:var(--text-primary);
    cursor:pointer;
  }
  .key:active{background:var(--brand-50)}
  .key.erase{
    background:transparent;border-color:var(--border);
    color:var(--text-secondary);
    display:flex;align-items:center;justify-content:center;
  }

  .home-indicator{
    position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
    width:134px;height:5px;border-radius:3px;background:var(--text-primary);opacity:.9;
  }
</style>
</head>
<body>
  <div class="device">
    <div class="status-bar">
      <span>9:42</span>
      <span class="right">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="5" y="4" width="3" height="8" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M1 4.5C3 2.5 6 1.5 8 1.5s5 1 7 3M3 7c1.5-1.2 3.2-1.7 5-1.7S11.5 5.8 13 7M5.5 9.3C6.2 8.8 7 8.5 8 8.5s1.8.3 2.5.8"/><circle cx="8" cy="10.7" r=".9" fill="currentColor"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x="0.5" y="0.5" width="22" height="11" rx="3" stroke="currentColor" opacity=".5"/><rect x="2" y="2" width="17" height="8" rx="1.5" fill="currentColor"/><rect x="23.5" y="3.5" width="1.5" height="5" rx=".5" fill="currentColor" opacity=".5"/></svg>
      </span>
    </div>

    <div class="nav">
      <button class="nav-btn" type="button" data-nav="03-home.html">
        <svg width="11" height="18" viewBox="0 0 11 18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 2 2 9 9 16"/></svg>

      <div class="nav-title">

        <span class="s">#143 · May 14</span>

      <button class="nav-btn" type="button" aria-label="More">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="5" cy="11" r="1.4" fill="currentColor"/><circle cx="11" cy="11" r="1.4" fill="currentColor"/><circle cx="17" cy="11" r="1.4" fill="currentColor"/></svg>
      </button>
    </div>

    <div class="status-row">
      <div class="item"><span class="v">01:48</span><span class="l">Time</span></div>
      <div class="item"><span class="v">12 / 25</span><span class="l">Filled</span></div>
      <div class="item"><span class="v">3</span><span class="l">Hints left</span></div>

    <div class="board-wrap">

        <!-- ROW 1 -->
        <div class="cell cb-t cb-l cb-r cb-b"><span>4</span></div>

        <div class="cell cb-t cb-r cb-b"><span>5</span></div>

        <div class="cell cb-l cb-r empty"></div>

        <div class="cell cb-b"><span>2</span></div>
        <div class="cell cb-l empty"></div>
        <div class="cell cb-r"><span>1</span></div>
        <!-- ROW 3 — just placed at r3c3 (player value) -->
        <div class="cell cb-l cb-r cb-b"><span>3</span></div>
        <div class="cell cb-b"><span>1</span></div>
        <div class="cell cb-r cb-b sel player"><span>4</span></div>
        <div class="cell empty"></div>
        <div class="cell cb-r cb-b"><span>2</span></div>
        <!-- ROW 4 -->
        <div class="cell cb-l cb-r"><span>5</span></div>
        <div class="cell cb-r"><span>2</span></div>
        <div class="cell cb-r cb-b"><span>3</span></div>
        <div class="cell cb-l empty"></div>
        <div class="cell cb-l cb-r cb-b"><span>4</span></div>

        <div class="cell cb-l cb-r cb-b empty"></div>
        <div class="cell cb-r cb-b"><span>3</span></div>
        <div class="cell cb-b empty"></div>
        <div class="cell cb-l cb-r cb-b"><span>5</span></div>
        <div class="cell cb-l cb-r cb-b"><span>2</span></div>
      </div>
    </div>

    <div class="technique">
      <span class="chip t-mastered" aria-label="Technique used">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 8 7 12 13 4"/></svg>
        <code>naked single</code> · mastered
      </span>
    </div>

    <div class="mastery-wrap" role="status" aria-live="polite" data-nav="15-post-solve-mastery.html">
      <div class="mastery-chip">
        <span class="check" aria-hidden="true">
          <svg width="8" height="8" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 8 7 12 13 4"/></svg>
        </span>
        <span><code>naked single</code> · mastered</span>
      </div>
      <span class="mastery-caption">You'll see this technique less often now.</span>
    </div>

    <div class="toolbar">
      <button class="tool" type="button" aria-label="Undo">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 7 9 7 9 13"/><path d="M20 18a8 8 0 0 0-13-6L3 16"/></svg>
        Undo
      </button>
      <button class="tool" type="button" aria-label="Notes">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 1 1 3 3L7 19l-4 1 1-4z"/></svg>
        Notes
      </button>
      <button class="tool" type="button" aria-label="Hint">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.7.7 1 1.6 1 2.3v1h6v-1c0-.7.3-1.6 1-2.3A7 7 0 0 0 12 2z"/></svg>
        Hint
      </button>
      <button class="tool" type="button" aria-label="Clear">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H8L3 14l5-6h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2z"/><path d="M11 11l5 5M16 11l-5 5"/></svg>
        Clear
      </button>
    </div>

    <div class="keypad">
      <button class="key" type="button">1</button>
      <button class="key" type="button">2</button>
      <button class="key" type="button">3</button>
      <button class="key" type="button">4</button>

        <svg width="20" height="16" viewBox="0 0 24 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 3H8L1 9l7 6h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"/><line x1="18" y1="6" x2="12" y2="12"/><line x1="12" y1="6" x2="18" y2="12"/></svg>
      </button>
    </div>

    <div class="home-indicator"></div>
  </div>
<script>
(function(){
  document.querySelectorAll('[data-nav]').forEach(function(el){
    el.style.cursor = 'pointer';
    el.addEventListener('click', function(ev){
      ev.preventDefault();
      var dest = el.getAttribute('data-nav');
      if (dest) window.location.href = dest;
    });
  });
})();
</script>
</body>
</html>
