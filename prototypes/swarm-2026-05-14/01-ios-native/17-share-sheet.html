<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tectonic — Share</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --brand-600:#0891b2;--brand-500:#06b6d4;--brand-100:#cffafe;--brand-50:#ecfeff;
    --surface:#f2f2f7;--surface-elevated:#ffffff;--surface-board:#ffffff;
    --surface-cell:#ffffff;--surface-cell-sel:#e0f7fa;
    --border:#e5e5e5;--border-cage:#a3a3a3;
    --text-primary:#0a0a0a;--text-secondary:#525252;--text-tertiary:#a3a3a3;--text-on-brand:#ffffff;
    --success:#10b981;--warning:#f59e0b;--danger:#dc2626;
    --separator:rgba(60,60,67,0.18);
    --sheet-bg:#ffffff;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --brand-600:#06b6d4;--brand-500:#22d3ee;--brand-100:#155057;--brand-50:#0e2a30;
      --surface:#000;--surface-elevated:#171717;--surface-board:#0f1419;
      --surface-cell:#1a1f24;--surface-cell-sel:#164e5b;
      --border:#2a2a2a;--border-cage:#525252;
      --text-primary:#fafafa;--text-secondary:#a3a3a3;--text-tertiary:#737373;--text-on-brand:#0a0a0a;
      --success:#34d399;--warning:#fbbf24;--danger:#f87171;
      --separator:rgba(84,84,88,0.5);
      --sheet-bg:#1c1c1e;
    }
  }
  @view-transition { navigation: auto; }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,sans-serif;background:#e9eaee;color:var(--text-primary);
    -webkit-font-smoothing:antialiased;min-height:100vh;
    display:flex;align-items:center;justify-content:center;
  }
  @media (prefers-color-scheme: dark){ body{background:#000} }
  .device{
    width:390px;min-height:844px;background:var(--surface);position:relative;overflow:hidden;
    box-shadow:0 12px 40px rgba(0,0,0,0.18);border-radius:44px;
    display:flex;flex-direction:column;
  }

  /* ------- Dimmed Solved screen behind the sheet ------- */
  .behind{
    position:absolute;inset:0;
    background:var(--surface);
    display:flex;flex-direction:column;
    filter:saturate(.9);
  }
  .status-bar{
    height:54px;display:flex;align-items:flex-end;justify-content:space-between;
    padding:0 28px 6px;font-size:15px;font-weight:600;letter-spacing:-.01em;flex-shrink:0;
    background:var(--surface);color:var(--text-primary);
  }
  .status-bar .right{display:flex;align-items:center;gap:6px}
  .b-nav{
    height:44px;display:flex;align-items:center;justify-content:space-between;
    padding:0 8px;background:var(--surface);
  }
  .b-nav .btn{
    background:none;border:0;font:inherit;color:var(--brand-600);font-size:15px;
    padding:8px 12px;display:flex;align-items:center;gap:4px;
  }
  .b-large{padding:8px 20px 16px;background:var(--surface)}
  .b-large .eyebrow{
    font-size:12px;font-weight:600;color:var(--success);
    letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;
    display:flex;align-items:center;gap:6px;
  }
  .b-large h1{
    font-size:34px;line-height:40px;font-weight:600;letter-spacing:-.02em;margin:0;
  }
  .b-large h1 .time{
    font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;color:var(--brand-600);
  }
  .b-large .sub{
    font-size:14px;color:var(--text-secondary);margin-top:6px;
    font-variant-numeric:tabular-nums;
  }
  .b-content{
    padding:8px 16px;display:flex;flex-direction:column;gap:12px;
  }
  .b-section-h{
    font-size:13px;font-weight:600;color:var(--text-tertiary);
    text-transform:uppercase;letter-spacing:.06em;padding:4px;
  }
  .b-list{
    background:var(--surface-elevated);border-radius:12px;overflow:hidden;
  }
  .b-row{
    display:flex;align-items:center;gap:14px;padding:14px 16px;
    font-size:15px;
  }
  .b-row + .b-row{border-top:1px solid var(--separator)}
  .b-row .lbl{flex:1}
  .b-row .val{
    font-family:'JetBrains Mono',monospace;
    font-variant-numeric:tabular-nums;color:var(--text-primary);
  }

  /* Scrim over the solved screen */
  .scrim{
    position:absolute;inset:0;background:rgba(0,0,0,0.45);z-index:2;
  }

  /* ------- Share sheet ------- */
  .sheet{
    position:absolute;left:8px;right:8px;bottom:8px;
    background:var(--sheet-bg);
    border-radius:14px;
    box-shadow:0 -12px 40px rgba(0,0,0,0.30);
    display:flex;flex-direction:column;
    z-index:3;
    max-height:720px;
    overflow:hidden;
  }
  .sheet-head{
    display:flex;flex-direction:column;align-items:center;
    padding:8px 0 4px;
  }
  .grabber{
    width:36px;height:5px;border-radius:999px;background:var(--text-tertiary);opacity:.45;
  }

  /* Preview card (the spoiler-free artifact) */
  .preview-card{
    margin:14px 14px 4px;
    padding:14px;
    background:var(--surface);
    border-radius:12px;
    display:flex;align-items:center;gap:14px;
  }
  .preview-grid{
    width:90px;height:90px;
    display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);
    gap:2px;background:var(--border-cage);
    border:1.5px solid var(--border-cage);border-radius:6px;
    padding:1.5px;flex-shrink:0;
  }
  .preview-grid .pc{
    background:var(--surface-cell);border-radius:1.5px;
  }
  .preview-grid .pc.g{background:var(--brand-600)}
  .preview-grid .pc.y{background:var(--warning)}
  .preview-grid .pc.r{background:var(--danger)}
  .preview-meta{flex:1;min-width:0}
  .preview-meta .title{
    font-size:15px;font-weight:600;letter-spacing:-.01em;
    color:var(--text-primary);
  }
  .preview-meta .sub{
    font-size:12px;color:var(--text-secondary);margin-top:2px;
    font-variant-numeric:tabular-nums;
  }
  .preview-meta .chip-row{
    display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;
  }
  .preview-meta .chip{
    font-size:11px;font-weight:500;color:var(--brand-600);
    background:var(--brand-50);
    padding:3px 8px;border-radius:999px;
    font-variant-numeric:tabular-nums;
  }
  .preview-meta .chip.muted{
    color:var(--text-secondary);background:var(--surface-elevated);
  }

  /* Recents row */
  .recents{
    padding:8px 14px 4px;
    display:flex;align-items:flex-start;gap:14px;justify-content:space-between;
    overflow-x:auto;
  }
  .recent{
    display:flex;flex-direction:column;align-items:center;gap:6px;
    min-width:60px;
    background:none;border:0;font:inherit;color:var(--text-primary);
    cursor:pointer;
  }
  .recent .av{
    width:54px;height:54px;border-radius:999px;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;font-weight:600;color:#fff;letter-spacing:-.01em;
  }
  .recent .av.a{background:#5856d6}
  .recent .av.b{background:#ff9500}
  .recent .av.c{background:#34c759}
  .recent .av.d{background:#8e8e93}
  .recent .nm{
    font-size:11px;color:var(--text-primary);
    max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }

  /* Apps row */
  .apps{
    padding:6px 14px 8px;
    display:flex;gap:14px;
    overflow-x:auto;
    border-top:0.5px solid var(--separator);
    margin-top:4px;
  }
  .app{
    display:flex;flex-direction:column;align-items:center;gap:6px;
    min-width:60px;
    background:none;border:0;font:inherit;color:var(--text-primary);
    cursor:pointer;padding-top:8px;
  }
  .app .icn{
    width:54px;height:54px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:inset 0 0 0 0.5px rgba(0,0,0,0.04);
    color:#fff;
  }
  .app .icn.msg{background:#34c759}
  .app .icn.mail{background:#007aff}
  .app .icn.x{background:#0a0a0a}
  .app .icn.wa{background:#25d366}
  .app .icn.thr{background:#0a0a0a}
  .app .icn.copy{background:#8e8e93}
  .app .icn.more{
    background:var(--surface);color:var(--text-secondary);
    box-shadow:inset 0 0 0 0.5px var(--separator);
  }
  .app .nm{
    font-size:11px;color:var(--text-primary);
    max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }

  /* Actions list */
  .actions{
    margin:12px 14px 0;
    background:var(--surface);
    border-radius:12px;
    overflow:hidden;
  }
  .action{
    display:flex;align-items:center;gap:14px;
    padding:14px 16px;
    font-size:16px;color:var(--text-primary);
    background:none;border:0;width:100%;text-align:left;font-family:inherit;
    cursor:pointer;
  }
  .action + .action{border-top:0.5px solid var(--separator)}
  .action .lbl{flex:1}
  .action .ico{color:var(--text-primary);display:flex;align-items:center;justify-content:center}

  /* Cancel */
  .cancel{
    margin:12px 14px 14px;
    background:var(--sheet-bg);
    border-radius:12px;
    height:56px;
    display:flex;align-items:center;justify-content:center;
    font-size:17px;font-weight:600;color:var(--brand-600);
    border:0;font-family:inherit;cursor:pointer;
    box-shadow:inset 0 0 0 0.5px var(--separator);
  }
  @media (prefers-color-scheme: dark){
    .cancel{background:#2c2c2e}
  }

  .home-indicator{
    position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
    width:134px;height:5px;border-radius:3px;background:#fafafa;opacity:.9;z-index:4;
  }
</style>
</head>
<body>
  <div class="device">
    <!-- ------ Solved screen, behind the sheet ------ -->
    <div class="behind" aria-hidden="true">
      <div class="status-bar">
        <span>9:43</span>
        <span class="right">
          <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="5" y="4" width="3" height="8" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M1 4.5C3 2.5 6 1.5 8 1.5s5 1 7 3M3 7c1.5-1.2 3.2-1.7 5-1.7S11.5 5.8 13 7M5.5 9.3C6.2 8.8 7 8.5 8 8.5s1.8.3 2.5.8"/><circle cx="8" cy="10.7" r=".9" fill="currentColor"/></svg>
          <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x="0.5" y="0.5" width="22" height="11" rx="3" stroke="currentColor" opacity=".5"/><rect x="2" y="2" width="17" height="8" rx="1.5" fill="currentColor"/><rect x="23.5" y="3.5" width="1.5" height="5" rx=".5" fill="currentColor" opacity=".5"/></svg>

          <div class="b-row"><span class="lbl">Mistakes</span><span class="val">0</span></div>
        </div>
      </div>
    </div>

    <!-- Scrim -->
    <div class="scrim" data-nav="06-solved.html"></div>

    <!-- ------ Share sheet ------ -->
    <div class="sheet" role="dialog" aria-label="Share">
      <div class="sheet-head">
        <div class="grabber"></div>
      </div>

      <!-- Preview card -->
      <div class="preview-card">
        <div class="preview-grid" aria-label="Performance preview, spoiler-free">
          <!-- Row 1 -->
          <span class="pc g"></span><span class="pc g"></span><span class="pc y"></span><span class="pc g"></span><span class="pc g"></span>
          <!-- Row 2 -->
          <span class="pc g"></span><span class="pc g"></span><span class="pc g"></span><span class="pc r"></span><span class="pc g"></span>
          <!-- Row 3 -->
          <span class="pc y"></span><span class="pc g"></span><span class="pc g"></span><span class="pc g"></span><span class="pc g"></span>
          <!-- Row 4 -->
          <span class="pc g"></span><span class="pc g"></span><span class="pc y"></span><span class="pc g"></span><span class="pc g"></span>
          <!-- Row 5 -->
          <span class="pc g"></span><span class="pc g"></span><span class="pc g"></span><span class="pc g"></span><span class="pc y"></span>
        </div>
        <div class="preview-meta">
          <div class="title">Tectonic #143</div>
          <div class="sub">Medium 5×5 · solved in 2:14</div>
          <div class="chip-row">
            <span class="chip">Hidden single</span>
            <span class="chip muted">1 hint</span>
          </div>
        </div>
      </div>

      <!-- Recents -->
      <div class="recents">
        <button class="recent" type="button" data-nav="06-solved.html"><span class="av a">MK</span><span class="nm">Maja</span></button>
        <button class="recent" type="button" data-nav="06-solved.html"><span class="av b">EN</span><span class="nm">Erik</span></button>
        <button class="recent" type="button" data-nav="06-solved.html"><span class="av c">JL</span><span class="nm">Jonna</span></button>

      </div>

      <div class="apps">

    <div class="home-indicator"></div>

<script>
(function(){
  document.querySelectorAll('[data-nav]').forEach(function(el){
    el.style.cursor = 'pointer';
    el.addEventListener('click', function(ev){
      ev.preventDefault();
      var dest = el.getAttribute('data-nav');
      if (dest) window.location.href = dest;
    });
  });
})();
</script>
</body>
</html>
