name: Deploy prototype to GitHub Pages

# Publishes the iOS-native clickable prototype (variant 01 of the
# 2026-05-14 swarm) to GitHub Pages. The prototype is static HTML —
# no build step. This replaces the earlier Vite-app deployment.

on:
  push:
    branches: [main, feature/swarm-and-stage-up]
    paths:
      - 'prototypes/swarm-2026-05-14/01-ios-native/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: prototypes/swarm-2026-05-14/01-ios-native
      - id: deployment
        uses: actions/deploy-pages@v4
