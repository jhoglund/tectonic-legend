<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Variant 04 — Conversational / AI-native</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --brand-600:#0891b2; --brand-500:#06b6d4; --brand-100:#cffafe; --brand-50:#ecfeff;
    --surface:#fafafa; --surface-elevated:#ffffff;
    --border:#e5e5e5;
    --text-primary:#0a0a0a; --text-secondary:#525252; --text-tertiary:#a3a3a3;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --brand-600:#06b6d4; --brand-500:#22d3ee; --brand-100:#155057; --brand-50:#0e2a30;
      --surface:#0a0a0a; --surface-elevated:#171717;
      --border:#2a2a2a;
      --text-primary:#fafafa; --text-secondary:#a3a3a3; --text-tertiary:#737373;
    }
  }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; height:100%; background:var(--surface); color:var(--text-primary); font:400 14px/20px 'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  .app { display:flex; min-height:100vh; }

  /* Sidebar */
  .nav {
    width:280px; flex-shrink:0;
    background:var(--surface-elevated); border-right:1px solid var(--border);
    position:sticky; top:0; align-self:flex-start; height:100vh; overflow-y:auto;
    padding:28px 20px;
    display:flex; flex-direction:column; gap:4px;
  }
  .brand {
    display:flex; align-items:center; gap:10px;
    margin-bottom:6px;
  }
  .brand-dot { width:8px; height:8px; border-radius:50%; background:var(--brand-600); }
  .brand-title { font:500 14px/1 'Inter',sans-serif; color:var(--text-primary); letter-spacing:0.04em; text-transform:uppercase; }

  .eyebrow { font:500 11px/1 'JetBrains Mono',monospace; letter-spacing:0.06em; color:var(--text-tertiary); text-transform:uppercase; margin-top:18px; margin-bottom:8px; padding:0 8px; }
  .variant-title { font:500 18px/24px 'Inter',sans-serif; color:var(--text-primary); padding:0 8px; margin-bottom:4px; }
  .variant-sub { font:400 13px/18px 'Inter',sans-serif; color:var(--text-secondary); padding:0 8px 12px; border-bottom:1px solid var(--border); margin-bottom:14px; }

  .nav-item {
    display:flex; align-items:center; gap:10px;
    padding:9px 10px; border-radius:8px;
    text-decoration:none; color:var(--text-secondary);
    font:500 13px/1 'Inter',sans-serif;
    cursor:pointer; border:none; background:transparent; text-align:left; width:100%;
  }
  .nav-item:hover { background:var(--surface); color:var(--text-primary); }
  .nav-item.active { background:var(--brand-50); color:var(--brand-600); }
  .nav-num {
    width:22px; height:22px; border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    font:500 11px/1 'JetBrains Mono',monospace;
    background:var(--surface); border:1px solid var(--border);
    color:var(--text-tertiary);
  }
  .nav-item.active .nav-num { background:var(--brand-600); color:#fff; border-color:var(--brand-600); }

  .nav-foot {
    margin-top:auto; padding:12px 8px 0; border-top:1px solid var(--border);
    font:400 12px/18px 'Inter',sans-serif; color:var(--text-tertiary);
  }
  .nav-foot a { color:var(--text-secondary); text-decoration:none; }
  .nav-foot a:hover { color:var(--text-primary); }

  /* Stage */
  .stage {
    flex:1; min-width:0; padding:40px 24px; display:flex; align-items:flex-start; justify-content:center;
    background:repeating-linear-gradient(45deg, transparent, transparent 14px, color-mix(in srgb, var(--border) 50%, transparent) 14px, color-mix(in srgb, var(--border) 50%, transparent) 15px);
  }
  .stage-inner {
    display:flex; flex-direction:column; align-items:center; gap:16px;
  }
  .stage-meta {
    font:500 11px/1 'JetBrains Mono',monospace; letter-spacing:0.06em; color:var(--text-tertiary); text-transform:uppercase;
  }
  .frame {
    width:430px; height:884px;
    background:transparent; border-radius:46px; padding:20px;
    background:#222;
    box-shadow:0 24px 64px rgba(0,0,0,0.35);
  }
  iframe {
    width:390px; height:844px; border:0; display:block;
    border-radius:36px; background:#000;
    margin:0 auto;
  }

  @media (max-width: 900px) {
    .app { flex-direction:column; }
    .nav { width:100%; height:auto; position:static; padding:16px; }
    .frame { transform-origin:top center; }
  }
</style>
</head>
<body>
  <div class="app">
    <nav class="nav">
      <div class="brand">
        <span class="brand-dot"></span>
        <span class="brand-title">Tectonic</span>
      </div>
      <div class="eyebrow">Swarm · 2026-05-14</div>
      <div class="variant-title">Variant 04 — Conversational</div>
      <div class="variant-sub">The hint engine as a persistent presence across every screen.</div>

      <div class="eyebrow">Screens</div>
      <button class="nav-item active" data-src="01-auth.html"><span class="nav-num">01</span>Auth</button>
      <button class="nav-item" data-src="02-onboarding.html"><span class="nav-num">02</span>Onboarding</button>
      <button class="nav-item" data-src="03-home.html"><span class="nav-num">03</span>Home</button>
      <button class="nav-item" data-src="04-new-game.html"><span class="nav-num">04</span>New game</button>
      <button class="nav-item" data-src="05-solving.html"><span class="nav-num">05</span>Solving</button>
      <button class="nav-item" data-src="06-solved.html"><span class="nav-num">06</span>Solved</button>
      <button class="nav-item" data-src="07-stats.html"><span class="nav-num">07</span>Stats</button>
      <button class="nav-item" data-src="08-stage-up.html"><span class="nav-num">08</span>Stage-up</button>

      <div class="nav-foot">
        <a href="STATUS.md">STATUS.md</a> · <a href="BRIEF.md">BRIEF.md</a> · <a href="PROMPT.md">PROMPT.md</a>
      </div>
    </nav>

    <main class="stage">
      <div class="stage-inner">
        <span class="stage-meta" id="meta">01 · Auth — chat-style intro</span>
        <div class="frame">
          <iframe id="screen" src="01-auth.html" title="Screen preview"></iframe>
        </div>
      </div>
    </main>
  </div>

  <script>
    const labels = {
      '01-auth.html':'01 · Auth — chat-style intro',
      '02-onboarding.html':'02 · Onboarding — tutorial as conversation',
      '03-home.html':'03 · Home — daily as a scrollable log',
      '04-new-game.html':'04 · New game — difficulty as engine reply',
      '05-solving.html':'05 · Solving — board + chat panel',
      '06-solved.html':'06 · Solved — summary in dialogue',
      '07-stats.html':'07 · Stats — "here\'s what I\'ve seen"',
      '08-stage-up.html':'08 · Stage-up — full-screen moment'
    };
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const src = btn.dataset.src;
        document.getElementById('screen').src = src;
        document.getElementById('meta').textContent = labels[src] || src;
      });
    });
  </script>
</body>
</html>
