<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tectonic — Today</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --brand-600:#0891b2;--brand-500:#06b6d4;--brand-100:#cffafe;--brand-50:#ecfeff;
    --surface:#f2f2f7;--surface-elevated:#ffffff;--surface-board:#ffffff;
    --surface-cell:#ffffff;--surface-cell-sel:#e0f7fa;
    --border:#e5e5e5;--border-cage:#a3a3a3;
    --text-primary:#0a0a0a;--text-secondary:#525252;--text-tertiary:#a3a3a3;--text-on-brand:#ffffff;
    --success:#10b981;--warning:#f59e0b;--danger:#dc2626;
    --separator:rgba(60,60,67,0.18);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --brand-600:#06b6d4;--brand-500:#22d3ee;--brand-100:#155057;--brand-50:#0e2a30;
      --surface:#000;--surface-elevated:#171717;--surface-board:#0f1419;
      --surface-cell:#1a1f24;--surface-cell-sel:#164e5b;
      --border:#2a2a2a;--border-cage:#525252;
      --text-primary:#fafafa;--text-secondary:#a3a3a3;--text-tertiary:#737373;--text-on-brand:#0a0a0a;
      --success:#34d399;--warning:#fbbf24;--danger:#f87171;
      --separator:rgba(84,84,88,0.5);
    }
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,sans-serif;background:#e9eaee;color:var(--text-primary);
    -webkit-font-smoothing:antialiased;min-height:100vh;
    display:flex;align-items:center;justify-content:center;
  }
  @media (prefers-color-scheme: dark){ body{background:#000} }
  .device{
    width:390px;min-height:844px;background:var(--surface);position:relative;overflow:hidden;
    box-shadow:0 12px 40px rgba(0,0,0,0.18);border-radius:44px;
    display:flex;flex-direction:column;
  }
  .status-bar{
    height:54px;display:flex;align-items:flex-end;justify-content:space-between;
    padding:0 28px 6px;font-size:15px;font-weight:600;letter-spacing:-.01em;flex-shrink:0;
    background:var(--surface);
  }
  .status-bar .right{display:flex;align-items:center;gap:6px}

  /* nav bar with large title */
  .large-title{
    padding:8px 20px 16px;background:var(--surface);
  }
  .large-title .date{
    font-size:13px;font-weight:600;color:var(--text-tertiary);
    text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;
  }
  .large-title h1{
    font-size:34px;line-height:40px;font-weight:600;letter-spacing:-.02em;margin:0;
  }
  .large-title .row{
    display:flex;align-items:flex-end;justify-content:space-between;
  }
  .avatar{
    width:32px;height:32px;border-radius:999px;
    background:var(--brand-100);color:var(--brand-600);
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:600;
    margin-bottom:4px;
  }

  .content{
    flex:1;overflow:auto;padding:8px 16px 16px;
    display:flex;flex-direction:column;gap:16px;
  }

  /* Stage chip + progress */
  .stage-card{
    background:var(--surface-elevated);border-radius:12px;
    padding:14px 16px;display:flex;align-items:center;gap:12px;
    box-shadow:0 1px 2px rgba(0,0,0,0.04);
  }
  .stage-chip{
    font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:var(--brand-600);background:var(--brand-50);
    border-radius:999px;padding:4px 10px;
  }
  .stage-info{flex:1}
  .stage-info .label{font-size:13px;color:var(--text-secondary);margin-top:4px}
  .stage-info .name{font-size:15px;font-weight:500;color:var(--text-primary)}
  .stage-progress{
    width:80px;height:4px;border-radius:999px;background:var(--border);overflow:hidden;
  }
  .stage-progress > span{
    display:block;height:100%;width:62%;background:var(--brand-600);border-radius:999px;
  }

  /* Hero daily card */
  .daily{
    background:var(--surface-elevated);border-radius:12px;
    padding:16px;box-shadow:0 1px 2px rgba(0,0,0,0.04);
    display:flex;flex-direction:column;gap:14px;
  }
  .daily-head{display:flex;justify-content:space-between;align-items:baseline}
  .daily .eyebrow{
    font-size:12px;font-weight:600;color:var(--brand-600);
    text-transform:uppercase;letter-spacing:.08em;
  }
  .daily .date-r{font-size:12px;color:var(--text-tertiary);font-variant-numeric:tabular-nums}
  .daily h2{
    font-size:24px;line-height:30px;font-weight:600;letter-spacing:-.01em;margin:0;
  }
  .daily .meta{
    display:flex;gap:16px;font-size:13px;color:var(--text-secondary);
    font-variant-numeric:tabular-nums;
  }
  .daily .meta b{font-weight:500;color:var(--text-primary)}
  .daily .preview{
    align-self:center;
    display:grid;grid-template-columns:repeat(5,28px);grid-template-rows:repeat(5,28px);
    border:1.5px solid var(--border-cage);border-radius:6px;overflow:hidden;
    background:var(--surface-board);
  }
  .daily .preview .c{
    border:1px solid var(--border);background:var(--surface-cell);
    display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-secondary);
    font-variant-numeric:tabular-nums;
  }
  .daily .preview .c.b{border-bottom:2px solid var(--border-cage)}
  .daily .preview .c.r{border-right:2px solid var(--border-cage)}
  .btn{
    height:44px;border-radius:8px;border:0;font:inherit;font-size:15px;font-weight:500;
    background:var(--brand-600);color:var(--text-on-brand);cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:6px;
    letter-spacing:-.01em;transition:opacity 120ms ease-out;
  }
  .btn:active{opacity:.85}
  .btn.secondary{
    background:var(--surface-elevated);color:var(--text-primary);
    border:1px solid var(--border);
  }

  /* Resume card */
  .resume{
    background:var(--surface-elevated);border-radius:12px;padding:14px 16px;
    box-shadow:0 1px 2px rgba(0,0,0,0.04);
    display:flex;align-items:center;gap:14px;
  }
  .resume-thumb{
    width:48px;height:48px;border-radius:8px;background:var(--brand-50);
    display:flex;align-items:center;justify-content:center;color:var(--brand-600);
  }
  .resume-info{flex:1}
  .resume-info .t{font-size:15px;font-weight:500}
  .resume-info .s{font-size:13px;color:var(--text-secondary);font-variant-numeric:tabular-nums;margin-top:2px}
  .chev{color:var(--text-tertiary)}

  /* Section header */
  .section-h{
    font-size:13px;font-weight:600;color:var(--text-tertiary);
    text-transform:uppercase;letter-spacing:.06em;
    padding:8px 4px 4px;
  }
  /* Inset grouped list */
  .list{
    background:var(--surface-elevated);border-radius:12px;overflow:hidden;
    box-shadow:0 1px 2px rgba(0,0,0,0.04);
  }
  .row{
    display:flex;align-items:center;gap:14px;
    padding:14px 16px;
  }
  .row + .row{border-top:1px solid var(--separator)}
  .row .icon{
    width:30px;height:30px;border-radius:7px;background:var(--brand-50);color:var(--brand-600);
    display:flex;align-items:center;justify-content:center;
  }
  .row .icon.alt{background:var(--surface);color:var(--text-secondary)}
  .row .label{flex:1;font-size:16px}
  .row .value{font-size:14px;color:var(--text-tertiary);font-variant-numeric:tabular-nums}

  /* Tab bar */
  .tab-bar{
    flex-shrink:0;
    background:rgba(250,250,250,0.86);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border-top:0.5px solid var(--separator);
    padding:8px 8px 28px;
    display:flex;justify-content:space-around;
  }
  @media (prefers-color-scheme: dark){
    .tab-bar{background:rgba(20,20,20,0.86)}
  }
  .tab{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
    background:none;border:0;font:inherit;cursor:pointer;
    color:var(--text-tertiary);padding:4px 0;
  }
  .tab .lbl{font-size:10px;font-weight:500;letter-spacing:.02em}
  .tab.active{color:var(--brand-600)}
  .tab svg{display:block}

  .home-indicator{
    position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
    width:134px;height:5px;border-radius:3px;background:var(--text-primary);opacity:.9;
  }
</style>
</head>

</html>
