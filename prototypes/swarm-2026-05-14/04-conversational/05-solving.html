<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Tectonic — Solving</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --brand-600:#0891b2; --brand-500:#06b6d4; --brand-100:#cffafe; --brand-50:#ecfeff;
    --surface:#fafafa; --surface-elevated:#ffffff; --surface-board:#ffffff;
    --surface-cell:#ffffff; --surface-cell-selected:#e0f7fa;
    --border:#e5e5e5; --border-cage:#a3a3a3;
    --text-primary:#0a0a0a; --text-secondary:#525252; --text-tertiary:#a3a3a3; --text-on-brand:#ffffff;
    --cell-assumption:#f59e0b; --cell-deduction:#3b82f6; --cell-contradiction:#dc2626; --cell-conclusion:#10b981;
    --shadow-card:0 2px 8px rgba(0,0,0,0.06);
    --shadow-cell:0 1px 2px rgba(0,0,0,0.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --brand-600:#06b6d4; --brand-500:#22d3ee; --brand-100:#155057; --brand-50:#0e2a30;
      --surface:#0a0a0a; --surface-elevated:#171717; --surface-board:#0f1419;
      --surface-cell:#1a1f24; --surface-cell-selected:#164e5b;
      --border:#2a2a2a; --border-cage:#525252;
      --text-primary:#fafafa; --text-secondary:#a3a3a3; --text-tertiary:#737373; --text-on-brand:#0a0a0a;
      --shadow-card:0 2px 8px rgba(0,0,0,0.4);
    }
  }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; background:#222; font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; font-feature-settings:"tnum" 1; }
  body { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .device {
    width:390px; height:844px; background:var(--surface); border-radius:36px; overflow:hidden;
    position:relative; box-shadow:0 24px 64px rgba(0,0,0,0.35);
    display:flex; flex-direction:column; color:var(--text-primary);
  }
  .safe-top { height:54px; flex-shrink:0; }
  .safe-bottom { height:34px; flex-shrink:0; }
  .notch { position:absolute; top:11px; left:50%; transform:translateX(-50%); width:120px; height:34px; background:#000; border-radius:20px; }
  .status-bar { position:absolute; top:0; left:0; right:0; height:54px; display:flex; align-items:center; justify-content:space-between; padding:18px 28px 0; font-size:15px; font-weight:600; }
  .home-indicator { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:134px; height:5px; background:var(--text-primary); opacity:0.35; border-radius:3px; }

  .top {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 16px 6px;
  }
  .top-left { display:flex; align-items:center; gap:8px; }
  .top-icon { width:32px; height:32px; border-radius:8px; background:transparent; border:none; color:var(--text-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .top-icon:hover { background:var(--surface-elevated); }
  .timer { font:500 14px/1 'JetBrains Mono',monospace; color:var(--text-secondary); font-variant-numeric:tabular-nums; }
  .top-meta { font-size:12px; color:var(--text-tertiary); }

  /* Board */
  .board-wrap { padding:6px 16px 8px; }
  .board {
    background:var(--surface-board); border:1.5px solid var(--border-cage);
    border-radius:16px; overflow:hidden;
    display:grid; grid-template-columns:repeat(5,1fr); grid-template-rows:repeat(5,1fr);
    aspect-ratio:1/1;
    box-shadow:var(--shadow-card);
  }
  .cell {
    position:relative;
    display:flex; align-items:center; justify-content:center;
    background:var(--surface-cell); color:var(--text-primary);
    font:500 24px/1 'JetBrains Mono',monospace;
    font-variant-numeric:tabular-nums;
    border-right:1px solid var(--border);
    border-bottom:1px solid var(--border);
    cursor:pointer;
  }
  .cell:nth-child(5n) { border-right:none; }
  .cell:nth-child(n+21) { border-bottom:none; }
  .cell.cage-r { border-right:1.5px solid var(--border-cage); }
  .cell.cage-b { border-bottom:1.5px solid var(--border-cage); }
  .cell.given { color:var(--text-primary); font-weight:500; }
  .cell.user { color:var(--brand-600); font-weight:500; }
  .cell.sel { background:var(--surface-cell-selected); }
  .cell.empty { color:transparent; }
  .cell .notes {
    position:absolute; inset:4px;
    display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(2,1fr);
    font:400 10px/1 'JetBrains Mono',monospace; color:var(--text-tertiary);
    font-variant-numeric:tabular-nums;
  }
  .cell .notes span { display:flex; align-items:center; justify-content:center; }

  /* Chain rings (sit ON cells) */
  .cell.assumption::after,
  .cell.deduction::after,
  .cell.contradiction::after,
  .cell.conclusion::after {
    content:""; position:absolute; inset:3px;
    border-radius:4px; pointer-events:none;
    box-shadow:inset 0 0 0 2px currentColor;
  }
  .cell.assumption { color: inherit; }
  .cell.assumption::after { color:var(--cell-assumption); }
  .cell.assumption .val { color:var(--cell-assumption); }
  .cell.deduction::after { color:var(--cell-deduction); }
  .cell.deduction .val { color:var(--cell-deduction); }
  .cell.contradiction::after { color:var(--cell-contradiction); }
  .cell.contradiction .val { color:var(--cell-contradiction); }
  .cell.conclusion::after { color:var(--cell-conclusion); }
  .cell.conclusion .val { color:var(--cell-conclusion); font-weight:600; }
  .cell .step-tag {
    position:absolute; top:2px; left:3px;
    font:600 9px/1 'JetBrains Mono',monospace;
    color:currentColor;
  }
  .cell.assumption .step-tag { color:var(--cell-assumption); }
  .cell.deduction .step-tag { color:var(--cell-deduction); }
  .cell.contradiction .step-tag { color:var(--cell-contradiction); }
  .cell.conclusion .step-tag { color:var(--cell-conclusion); }

  /* Contradiction stepper */
  .stepper {
    display:flex; align-items:center; gap:6px;
    padding:8px 16px 6px;
    overflow-x:auto;
  }
  .step {
    flex-shrink:0;
    display:inline-flex; align-items:center; gap:6px;
    padding:5px 10px; border-radius:999px;
    font:500 11px/1 'JetBrains Mono',monospace; letter-spacing:0.04em;
    border:1px solid currentColor; background:transparent;
  }
  .step.s-assumption { color:var(--cell-assumption); }
  .step.s-deduction { color:var(--cell-deduction); }
  .step.s-contradiction { color:var(--cell-contradiction); }
  .step.s-conclusion { color:var(--cell-conclusion); }
  .step .dot { width:5px; height:5px; border-radius:50%; background:currentColor; }
  .step-sep { color:var(--text-tertiary); font:500 10px/1 'JetBrains Mono',monospace; }
  .step.active { background:color-mix(in srgb, currentColor 10%, transparent); }

  /* Technique chip */
  .technique-chip {
    display:inline-flex; align-items:center; gap:6px;
    padding:5px 10px; border-radius:999px;
    background:var(--brand-50); color:var(--brand-600);
    font:500 11px/1 'Inter',sans-serif; letter-spacing:0.02em;
    border:1px solid var(--brand-100);
  }

  /* Chat panel */
  .chat-panel {
    flex:1; min-height:0; display:flex; flex-direction:column;
    padding:6px 16px 0;
    overflow:hidden;
  }
  .chat-scroll {
    flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px;
    padding:6px 0;
  }
  .msg-engine { display:flex; gap:10px; max-width:92%; }
  .engine-dot { width:6px; height:6px; border-radius:50%; background:var(--brand-600); margin-top:8px; flex-shrink:0; }
  .engine-body { color:var(--text-primary); font-size:14px; line-height:20px; }
  .engine-sub { color:var(--text-secondary); font-size:13px; line-height:18px; margin-top:2px; }
  .msg-player { align-self:flex-end; color:var(--text-secondary); font-size:13px; line-height:18px; text-align:right; max-width:80%; }
  .qa-row { display:flex; gap:6px; flex-wrap:wrap; }
  .qa-btn {
    background:var(--surface-elevated); border:1px solid var(--border);
    color:var(--text-primary); font:500 12px/1 'Inter',sans-serif;
    padding:7px 10px; border-radius:999px; cursor:pointer;
  }
  .qa-btn.primary { background:var(--brand-600); border-color:var(--brand-600); color:var(--text-on-brand); }

  /* Tool dock + pill */
  .dock {
    display:flex; align-items:center; gap:6px;
    padding:6px 12px 6px;
    background:transparent;
  }
  .dock-btn {
    width:36px; height:36px; border-radius:8px;
    background:transparent; border:1px solid transparent; color:var(--text-secondary);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .dock-btn.on { color:var(--brand-600); background:var(--brand-50); border-color:var(--brand-100); }
  .dock-num {
    flex:1; display:grid; grid-template-columns:repeat(5,1fr); gap:4px;
  }
  .num-btn {
    height:36px; border-radius:8px; background:var(--surface-elevated); border:1px solid var(--border);
    color:var(--text-primary); font:500 16px/1 'JetBrains Mono',monospace; font-variant-numeric:tabular-nums;
    cursor:pointer;
  }
  .num-btn:hover { background:var(--surface); }

  .pill-wrap { padding:4px 16px 12px; }
  .pill { display:flex; align-items:center; gap:10px; background:var(--surface-elevated); border:1px solid var(--border); border-radius:999px; padding:9px 12px; box-shadow:var(--shadow-card); }
  .pill-dot { width:6px; height:6px; border-radius:50%; background:var(--brand-600); flex-shrink:0; }
  .pill-input { flex:1; border:none; background:transparent; outline:none; color:var(--text-primary); font:400 13px/18px 'Inter',sans-serif; }
  .pill-input::placeholder { color:var(--text-tertiary); }
  .pill-kbd { font:500 11px/1 'JetBrains Mono',monospace; color:var(--text-tertiary); border:1px solid var(--border); border-radius:4px; padding:3px 5px; }

  .val { display:inline-block; }
</style>
</head>
<body>
  <div class="device">
    <div class="safe-top"></div>
    <div class="notch"></div>
    <div class="status-bar"><span>9:41</span><span><svg width="18" height="11" viewBox="0 0 18 11" fill="none"><rect x="0.5" y="0.5" width="14" height="10" rx="2" stroke="currentColor"/><rect x="2" y="2" width="11" height="7" rx="1" fill="currentColor"/><rect x="15.5" y="3.5" width="1.5" height="4" rx="0.5" fill="currentColor"/></svg></span></div>

    <div class="top">
      <div class="top-left">
        <button class="top-icon" aria-label="Back">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M11 4L6 9l5 5"/></svg>
        </button>
        <span class="top-meta">Hard · 5 × 5</span>
      </div>
      <span class="timer">02 : 14</span>
      <button class="top-icon" aria-label="Pause">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="3" y="2" width="3" height="10" rx="1"/><rect x="8" y="2" width="3" height="10" rx="1"/></svg>
      </button>
    </div>

    <div class="board-wrap">
      <div class="board">
        <!-- Row 1 -->
        <div class="cell given cage-r cage-b">3</div>
        <div class="cell empty cage-b"><span class="notes"><span>1</span><span></span><span></span><span></span><span>4</span><span>5</span></span></div>
        <div class="cell user cage-r cage-b assumption"><span class="step-tag">1</span><span class="val">2</span></div>
        <div class="cell empty cage-b"><span class="notes"><span></span><span></span><span></span><span></span><span>4</span><span></span></span></div>
        <div class="cell given cage-b">5</div>

        <!-- Row 2 -->
        <div class="cell empty cage-r cage-b"><span class="notes"><span></span><span>2</span><span></span><span>4</span><span></span><span></span></span></div>
        <div class="cell user cage-r cage-b">3</div>
        <div class="cell empty cage-b deduction"><span class="step-tag">2</span><span class="val">5</span></div>
        <div class="cell user cage-r cage-b">1</div>
        <div class="cell given">2</div>

        <!-- Row 3 -->
        <div class="cell given cage-b">4</div>
        <div class="cell empty cage-r cage-b"><span class="notes"><span>1</span><span></span><span></span><span></span><span>5</span><span></span></span></div>
        <div class="cell user cage-b">4</div>
        <div class="cell given cage-r cage-b">5</div>
        <div class="cell empty"><span class="notes"><span></span><span></span><span>3</span><span></span><span></span><span></span></span></div>

        <!-- Row 4 -->
        <div class="cell user cage-r">2</div>
        <div class="cell given cage-r cage-b">5</div>
        <div class="cell empty contradiction cage-b"><span class="step-tag">3</span><span class="val">2</span></div>
        <div class="cell empty cage-r cage-b"><span class="notes"><span></span><span></span><span>3</span><span></span><span></span><span></span></span></div>
        <div class="cell empty"><span class="notes"><span>1</span><span></span><span></span><span>4</span><span></span><span></span></span></div>

        <!-- Row 5 -->
        <div class="cell given cage-r">1</div>
        <div class="cell empty cage-r"><span class="notes"><span></span><span>2</span><span></span><span>4</span><span></span><span></span></span></div>
        <div class="cell empty conclusion sel"><span class="step-tag">✓</span><span class="val">3</span></div>
        <div class="cell empty cage-r"><span class="notes"><span></span><span>2</span><span></span><span></span><span></span><span></span></span></div>
        <div class="cell given">4</div>
      </div>
    </div>

    <div class="stepper">
      <span class="step s-assumption"><span class="dot"></span>1 · Assume 2</span>
      <span class="step-sep">→</span>
      <span class="step s-deduction"><span class="dot"></span>2 · Forces 5</span>
      <span class="step-sep">→</span>
      <span class="step s-contradiction"><span class="dot"></span>3 · Two 2s in cage</span>
      <span class="step-sep">→</span>
      <span class="step s-conclusion active"><span class="dot"></span>4 · So it's 3</span>
    </div>

    <div class="chat-panel">
      <div class="chat-scroll">
        <div class="msg-engine">
          <span class="engine-dot"></span>
          <div>
            <div class="engine-body">I followed the chain four steps.</div>
            <div class="engine-sub">If R5C3 is 2, R2C3 is forced to 5, and R4C3 also lands on 2 — same cage twice. So R5C3 is 3.</div>
            <div style="margin-top:8px;"><span class="technique-chip"><span style="width:5px;height:5px;border-radius:50%;background:currentColor;"></span>Contradiction chain</span></div>
          </div>
        </div>
        <div class="qa-row" style="margin-left:16px;">
          <button class="qa-btn primary">Place 3</button>
          <button class="qa-btn">Step through</button>
          <button class="qa-btn">Let me try</button>
        </div>
      </div>
    </div>

    <div class="dock">
      <button class="dock-btn on" aria-label="Pencil notes">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M2 14l1-4 8-8 3 3-8 8-4 1z"/></svg>
      </button>
      <div class="dock-num">
        <button class="num-btn">1</button>
        <button class="num-btn">2</button>
        <button class="num-btn">3</button>
        <button class="num-btn">4</button>
        <button class="num-btn">5</button>
      </div>
      <button class="dock-btn" aria-label="Erase">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l5-5 4 4-5 5H4l-1-1v-3z"/><path d="M7 14h7"/></svg>
      </button>
    </div>

    <div class="pill-wrap">
      <div class="pill">
        <span class="pill-dot"></span>
        <input class="pill-input" placeholder="'why?', 'point at it', 'quieter'" />
        <span class="pill-kbd">↵</span>
      </div>
    </div>

    <div class="safe-bottom"></div>
    <div class="home-indicator"></div>
  </div>
</body>
</html>
