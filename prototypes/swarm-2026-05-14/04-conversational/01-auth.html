<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Tectonic — Auth</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --brand-600:#0891b2; --brand-500:#06b6d4; --brand-100:#cffafe; --brand-50:#ecfeff;
    --surface:#fafafa; --surface-elevated:#ffffff; --surface-board:#ffffff;
    --surface-cell:#ffffff; --surface-cell-selected:#e0f7fa;
    --border:#e5e5e5; --border-cage:#a3a3a3;
    --text-primary:#0a0a0a; --text-secondary:#525252; --text-tertiary:#a3a3a3; --text-on-brand:#ffffff;
    --success:#10b981; --warning:#f59e0b; --danger:#dc2626;
    --cell-assumption:#f59e0b; --cell-deduction:#3b82f6; --cell-contradiction:#dc2626; --cell-conclusion:#10b981;
    --shadow-card:0 2px 8px rgba(0,0,0,0.06);
    --shadow-cell:0 1px 2px rgba(0,0,0,0.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --brand-600:#06b6d4; --brand-500:#22d3ee; --brand-100:#155057; --brand-50:#0e2a30;
      --surface:#0a0a0a; --surface-elevated:#171717; --surface-board:#0f1419;
      --surface-cell:#1a1f24; --surface-cell-selected:#164e5b;
      --border:#2a2a2a; --border-cage:#525252;
      --text-primary:#fafafa; --text-secondary:#a3a3a3; --text-tertiary:#737373; --text-on-brand:#0a0a0a;
      --success:#34d399; --warning:#fbbf24; --danger:#f87171;
      --shadow-card:0 2px 8px rgba(0,0,0,0.4);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:#222; font-family:'Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased; font-feature-settings:"tnum" 1, "cv11" 1; }
  body { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .device {
    width:390px; height:844px; background:var(--surface); border-radius:36px; overflow:hidden;
    position:relative; box-shadow:0 24px 64px rgba(0,0,0,0.35);
    display:flex; flex-direction:column;
    color:var(--text-primary);
  }
  .safe-top { height:54px; flex-shrink:0; }
  .safe-bottom { height:34px; flex-shrink:0; }
  .status-bar {
    position:absolute; top:0; left:0; right:0; height:54px; display:flex; align-items:center; justify-content:space-between;
    padding:18px 28px 0; font-size:15px; font-weight:600; letter-spacing:-0.01em; pointer-events:none;
  }
  .notch {
    position:absolute; top:11px; left:50%; transform:translateX(-50%);
    width:120px; height:34px; background:#000; border-radius:20px;
  }

  .wordmark {
    display:flex; align-items:center; gap:8px; padding:20px 24px 0;
    font-size:13px; font-weight:500; color:var(--text-secondary); letter-spacing:0.04em; text-transform:uppercase;
  }
  .wordmark-dot { width:6px; height:6px; border-radius:50%; background:var(--brand-600); }

  .chat-scroll {
    flex:1; overflow-y:auto; padding:24px 24px 16px;
    display:flex; flex-direction:column; gap:16px;
  }
  .msg-engine {
    display:flex; gap:10px; max-width:88%;
  }
  .engine-dot {
    width:6px; height:6px; border-radius:50%; background:var(--brand-600);
    margin-top:9px; flex-shrink:0;
  }
  .engine-body {
    color:var(--text-primary); font-size:16px; line-height:24px; font-weight:400;
  }
  .engine-meta {
    color:var(--text-tertiary); font-size:12px; line-height:16px; margin-top:4px;
    font-variant-numeric:tabular-nums;
  }
  .msg-player {
    align-self:flex-end; max-width:80%;
    color:var(--text-secondary); font-size:15px; line-height:22px;
    text-align:right;
  }

  .auth-card {
    background:var(--surface-elevated); border:1px solid var(--border);
    border-radius:12px; padding:8px;
    display:flex; flex-direction:column; gap:2px;
    box-shadow:var(--shadow-card);
  }
  .auth-btn {
    display:flex; align-items:center; gap:12px;
    padding:14px 14px; background:transparent; border:none; cursor:pointer;
    color:var(--text-primary); font:500 15px/20px 'Inter',sans-serif;
    border-radius:8px; text-align:left;
  }
  .auth-btn:hover { background:var(--surface); }
  .auth-icon {
    width:20px; height:20px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  }
  .auth-divider {
    display:flex; align-items:center; gap:10px; padding:0 6px;
    color:var(--text-tertiary); font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase;
  }
  .auth-divider::before, .auth-divider::after {
    content:""; flex:1; height:1px; background:var(--border);
  }

  .typing {
    display:flex; gap:4px; align-items:center; padding:6px 0;
  }
  .typing-dot { width:5px; height:5px; border-radius:50%; background:var(--text-tertiary); }

  /* Chat pill */
  .pill-wrap {
    padding:0 16px 12px;
  }
  .pill {
    display:flex; align-items:center; gap:10px;
    background:var(--surface-elevated); border:1px solid var(--border);
    border-radius:999px; padding:10px 14px;
    box-shadow:var(--shadow-card);
  }
  .pill-dot { width:6px; height:6px; border-radius:50%; background:var(--brand-600); flex-shrink:0; }
  .pill-input {
    flex:1; border:none; background:transparent; outline:none;
    color:var(--text-primary); font:400 14px/20px 'Inter',sans-serif;
  }
  .pill-input::placeholder { color:var(--text-tertiary); }
  .pill-kbd {
    font:500 11px/1 'JetBrains Mono',monospace; color:var(--text-tertiary);
    border:1px solid var(--border); border-radius:4px; padding:3px 5px;
  }

  .home-indicator {
    position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
    width:134px; height:5px; background:var(--text-primary); opacity:0.35; border-radius:3px;
  }

  a, button { font-family:inherit; }
</style>
</head>
<body>
  <div class="device">
    <div class="safe-top"></div>
    <div class="notch"></div>
    <div class="status-bar">
      <span>9:41</span>
      <span style="display:flex;gap:6px;align-items:center;">
        <svg width="18" height="11" viewBox="0 0 18 11" fill="none"><rect x="0.5" y="0.5" width="14" height="10" rx="2" stroke="currentColor"/><rect x="2" y="2" width="11" height="7" rx="1" fill="currentColor"/><rect x="15.5" y="3.5" width="1.5" height="4" rx="0.5" fill="currentColor"/></svg>
      </span>
    </div>

    <div class="wordmark">
      <span class="wordmark-dot"></span>
      <span>Tectonic</span>
    </div>

    <div class="chat-scroll">
      <div class="msg-engine">
        <span class="engine-dot"></span>
        <div>
          <div class="engine-body">Welcome. I'll help you get better at Tectonic.</div>
        </div>
      </div>

      <div class="msg-engine">
        <span class="engine-dot"></span>
        <div>
          <div class="engine-body">First — let's sign you in. New or returning, either works.</div>
        </div>
      </div>

      <div style="margin-top:4px;">
        <div class="auth-card">
          <button class="auth-btn">
            <span class="auth-icon">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M14.6 9.18c0-.56-.05-1.1-.14-1.61H9v3.05h3.13a2.68 2.68 0 0 1-1.16 1.76v1.46h1.88c1.1-1.01 1.74-2.5 1.74-4.27z" fill="#4285F4"/>
                <path d="M9 15c1.57 0 2.89-.52 3.85-1.41l-1.88-1.46c-.52.35-1.19.56-1.97.56-1.52 0-2.8-1.02-3.26-2.4H3.79v1.5A6 6 0 0 0 9 15z" fill="#34A853"/>
                <path d="M5.74 10.29A3.6 3.6 0 0 1 5.55 9c0-.45.07-.89.19-1.29V6.21H3.79A6 6 0 0 0 3 9c0 .97.23 1.88.79 2.79l1.95-1.5z" fill="#FBBC05"/>
                <path d="M9 5.31c.86 0 1.62.3 2.23.87l1.67-1.67A6 6 0 0 0 9 3a6 6 0 0 0-5.21 3.21l1.95 1.5C6.2 6.33 7.48 5.31 9 5.31z" fill="#EA4335"/>
              </svg>
            </span>
            Continue with Google
          </button>
          <button class="auth-btn">
            <span class="auth-icon">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><path d="M12.66 9.51c-.02-2.1 1.72-3.1 1.79-3.15-.98-1.43-2.5-1.62-3.04-1.65-1.29-.13-2.52.76-3.18.76-.66 0-1.67-.74-2.75-.72-1.41.02-2.72.83-3.45 2.1-1.47 2.56-.38 6.33 1.06 8.4.7 1.02 1.54 2.16 2.62 2.12 1.06-.04 1.46-.68 2.74-.68 1.28 0 1.64.68 2.76.66 1.14-.02 1.86-1.03 2.56-2.05.8-1.18 1.13-2.33 1.15-2.39-.03-.01-2.21-.85-2.26-3.4zM10.6 3.45c.58-.72.97-1.71.86-2.7-.84.04-1.86.57-2.46 1.28-.54.63-1.01 1.65-.88 2.62.94.07 1.9-.48 2.48-1.2z"/></svg>
            </span>
            Continue with Apple
          </button>
          <button class="auth-btn">
            <span class="auth-icon">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2" y="4" width="14" height="10" rx="1.5"/><path d="M2.5 4.8L9 9.5l6.5-4.7"/></svg>
            </span>
            Continue with email
          </button>
        </div>
      </div>

      <div class="msg-engine" style="margin-top:8px;">
        <span class="engine-dot"></span>
        <div>
          <div class="engine-body" style="color:var(--text-secondary); font-size:14px; line-height:20px;">No passwords, no streaks. Just puzzles and the techniques to crack them.</div>
        </div>
      </div>
    </div>

    <div class="pill-wrap">
      <div class="pill">
        <span class="pill-dot"></span>
        <input class="pill-input" placeholder="Ask the engine anything" />
        <span class="pill-kbd">↵</span>
      </div>
    </div>

    <div class="safe-bottom"></div>
    <div class="home-indicator"></div>
  </div>
</body>
</html>
