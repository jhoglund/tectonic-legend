name: Deploy to GitHub Pages

# Builds the Vite app and publishes dist/ to GitHub Pages on every push
# to main. (This replaces the earlier prototype-only deployment.)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # persist-credentials: false so checkout does not leave a github.com auth
      # header (GITHUB_TOKEN) that overrides CONFIG_REPO_TOKEN during npm ci and
      # 404s the private @hoglund/config fetch. This build job does not push git,
      # so dropping the persisted credential is safe. See radar ADR 0021.
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # @hoglund/config is a private github: dep that npm resolves over SSH; the
      # runner has no SSH key. Rewrite github.com git URLs to token HTTPS so npm ci
      # can read it. CONFIG_REPO_TOKEN is a per-repo read-only Actions secret (a
      # fine-grained PAT with contents:read on jhoglund/config). The --add is
      # required: insteadOf is multi-valued and a plain second line would replace
      # the ssh:// rule the lockfile needs. See radar ADR 0021.
      - name: Authenticate github.com git dependencies
        env:
          CONFIG_REPO_TOKEN: ${{ secrets.CONFIG_REPO_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${CONFIG_REPO_TOKEN}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global --add url."https://x-access-token:${CONFIG_REPO_TOKEN}@github.com/".insteadOf "git@github.com:"
      - run: npm ci
      - run: npm run build
        env:
          # Mimir analytics — optional. When these repository
          # variables/secret are unset the app builds with no analytics
          # (the vite.config plugin simply omits the SDK script).
          VITE_MIMIR_SCRIPT_URL: ${{ vars.VITE_MIMIR_SCRIPT_URL }}
          VITE_MIMIR_ENDPOINT: ${{ vars.VITE_MIMIR_ENDPOINT }}
          VITE_MIMIR_TOKEN: ${{ secrets.VITE_MIMIR_TOKEN }}
          VITE_MIMIR_APP_VERSION: ${{ github.sha }}
          # Supabase accounts (ADR-0013). When unset the app builds
          # local-only with accounts disabled. The anon key is
          # client-safe to ship — RLS is the security boundary.
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
