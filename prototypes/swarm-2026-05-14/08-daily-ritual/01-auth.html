<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Tectonic — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --brand-600:#0891b2; --brand-500:#06b6d4; --brand-100:#cffafe; --brand-50:#ecfeff;
    --surface:#fafafa; --surface-elevated:#ffffff; --surface-board:#ffffff;
    --surface-cell:#ffffff; --surface-cell-selected:#e0f7fa;
    --border:#e5e5e5; --border-cage:#a3a3a3;
    --text-primary:#0a0a0a; --text-secondary:#525252; --text-tertiary:#a3a3a3; --text-on-brand:#ffffff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --brand-600:#06b6d4; --brand-500:#22d3ee; --brand-100:#155057; --brand-50:#0e2a30;
      --surface:#0a0a0a; --surface-elevated:#171717; --surface-board:#0f1419;
      --surface-cell:#1a1f24; --surface-cell-selected:#164e5b;
      --border:#2a2a2a; --border-cage:#525252;
      --text-primary:#fafafa; --text-secondary:#a3a3a3; --text-tertiary:#737373; --text-on-brand:#0a0a0a;
    }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#222;font-family:'Inter',system-ui,sans-serif;color:var(--text-primary);font-variant-numeric:tabular-nums}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .device{
    width:390px;height:844px;background:var(--surface);
    border-radius:44px;overflow:hidden;position:relative;
    box-shadow:0 24px 80px rgba(0,0,0,0.35);
    display:flex;flex-direction:column;
  }
  .status-bar{
    height:54px;padding:18px 32px 0;display:flex;justify-content:space-between;align-items:flex-start;
    font-size:15px;font-weight:600;color:var(--text-primary);flex:0 0 auto;
  }
  .status-bar .dots{display:flex;gap:6px;align-items:center}
  .status-bar .dot{width:4px;height:4px;border-radius:50%;background:var(--text-primary)}
  .content{flex:1;display:flex;flex-direction:column;padding:24px 32px 40px;overflow:hidden}
  .brand{
    font-size:14px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;
    color:var(--text-primary);margin-top:24px;margin-bottom:64px;
  }
  .pitch{
    font-size:28px;line-height:34px;font-weight:600;letter-spacing:-0.02em;
    color:var(--text-primary);margin-bottom:16px;
  }
  .pitch em{font-style:normal;color:var(--brand-600)}
  .body{
    font-size:15px;line-height:22px;font-weight:400;color:var(--text-secondary);
    margin-bottom:48px;max-width:300px;
  }
  .today-stub{
    margin-bottom:48px;padding:16px;border:1px solid var(--border);border-radius:12px;
    background:var(--surface-elevated);display:flex;align-items:center;gap:14px;
  }
  .stub-icon{
    width:48px;height:48px;border-radius:8px;background:var(--surface-board);
    display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
    padding:6px;gap:1px;
  }
  .stub-icon .c{background:var(--border)}
  .stub-icon .c.on{background:var(--brand-500)}
  .stub-text{flex:1}
  .stub-eyebrow{font-size:11px;font-weight:600;color:var(--brand-600);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:2px}
  .stub-date{font-size:15px;font-weight:600;color:var(--text-primary)}
  .stub-sub{font-size:12px;font-weight:400;color:var(--text-secondary)}
  .spacer{flex:1}
  .btn-stack{display:flex;flex-direction:column;gap:10px}
  .btn{
    height:48px;border-radius:8px;border:1px solid var(--border);
    background:var(--surface-elevated);color:var(--text-primary);
    font-family:inherit;font-size:15px;font-weight:500;letter-spacing:0.01em;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:10px;
    text-decoration:none;
  }
  .btn.primary{background:var(--brand-600);color:var(--text-on-brand);border-color:var(--brand-600);font-weight:600}
  .btn svg{width:18px;height:18px}
  .toggle{
    text-align:center;margin-top:20px;font-size:13px;color:var(--text-secondary);
  }
  .toggle a{color:var(--text-primary);font-weight:500;text-decoration:underline;text-underline-offset:3px}
</style>
</head>
<body>
<div class="device">
  <div class="status-bar">
    <span>9:41</span>
    <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  </div>
  <div class="content">
    <div class="brand">Tectonic</div>
    <div class="pitch">One puzzle a day.<br/>The same puzzle for <em>everyone</em>.</div>
    <div class="body">See how you do. A streak starts the first time you solve.</div>

    <div class="today-stub">
      <div class="stub-icon">
        <span class="c on"></span><span class="c"></span><span class="c on"></span>
        <span class="c"></span><span class="c on"></span><span class="c"></span>
        <span class="c on"></span><span class="c"></span><span class="c on"></span>
      </div>
      <div class="stub-text">
        <div class="stub-eyebrow">Today</div>
        <div class="stub-date">Thursday, May 14</div>
        <div class="stub-sub">Hard · 5×5</div>
      </div>
    </div>

    <div class="spacer"></div>
    <div class="btn-stack">
      <a class="btn primary" href="02-onboarding.html">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        Continue with Apple
      </a>
      <a class="btn" href="02-onboarding.html">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18a11 11 0 0 0 0 9.86l2.83-2.2.83-.64z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1a11 11 0 0 0-9.82 6.07l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/></svg>
        Continue with Google
      </a>
      <a class="btn" href="02-onboarding.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
        Continue with email
      </a>
    </div>
    <div class="toggle">New here? <a href="02-onboarding.html">Create an account</a></div>
  </div>
</div>
</body>
</html>
