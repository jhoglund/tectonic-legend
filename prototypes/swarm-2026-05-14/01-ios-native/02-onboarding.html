<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tectonic — Onboarding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --brand-600:#0891b2;--brand-500:#06b6d4;--brand-100:#cffafe;--brand-50:#ecfeff;
    --surface:#fafafa;--surface-elevated:#ffffff;--surface-board:#ffffff;
    --surface-cell:#ffffff;--surface-cell-sel:#e0f7fa;
    --border:#e5e5e5;--border-cage:#a3a3a3;
    --text-primary:#0a0a0a;--text-secondary:#525252;--text-tertiary:#a3a3a3;--text-on-brand:#ffffff;
    --success:#10b981;--warning:#f59e0b;--danger:#dc2626;
    --c-assumption:#f59e0b;--c-deduction:#3b82f6;--c-contradiction:#dc2626;--c-conclusion:#10b981;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --brand-600:#06b6d4;--brand-500:#22d3ee;--brand-100:#155057;--brand-50:#0e2a30;
      --surface:#0a0a0a;--surface-elevated:#171717;--surface-board:#0f1419;
      --surface-cell:#1a1f24;--surface-cell-sel:#164e5b;
      --border:#2a2a2a;--border-cage:#525252;
      --text-primary:#fafafa;--text-secondary:#a3a3a3;--text-tertiary:#737373;--text-on-brand:#0a0a0a;
      --success:#34d399;--warning:#fbbf24;--danger:#f87171;
    }
  }
  @view-transition { navigation: auto; }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,sans-serif;background:#e9eaee;color:var(--text-primary);
    -webkit-font-smoothing:antialiased;min-height:100vh;
    display:flex;align-items:center;justify-content:center;
  }
  @media (prefers-color-scheme: dark){ body{background:#000} }
  .device{
    width:390px;min-height:844px;background:var(--surface);position:relative;overflow:hidden;
    box-shadow:0 12px 40px rgba(0,0,0,0.18);border-radius:44px;
    display:flex;flex-direction:column;
  }
  .status-bar{
    height:54px;display:flex;align-items:flex-end;justify-content:space-between;
    padding:0 28px 6px;font-size:15px;font-weight:600;letter-spacing:-.01em;flex-shrink:0;
  }
  .status-bar .right{display:flex;align-items:center;gap:6px}

  .nav{
    height:44px;display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;flex-shrink:0;
  }
  .nav button{
    background:none;border:0;font:inherit;font-size:15px;color:var(--brand-600);
    cursor:pointer;padding:8px;
  }
  .nav .skip{font-weight:400}

  .page{
    flex:1;display:flex;flex-direction:column;align-items:center;
    padding:24px 32px 0;
  }
  .illus{
    width:240px;height:240px;margin:24px 0 32px;
    display:flex;align-items:center;justify-content:center;
    position:relative;
  }
  .mini-board{
    display:grid;grid-template-columns:repeat(3,52px);grid-template-rows:repeat(3,52px);
    gap:0;background:var(--surface-board);
    border:2px solid var(--border-cage);border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.06);overflow:hidden;
  }
  .mini-cell{
    border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;
    font-size:22px;font-weight:500;color:var(--text-primary);
    background:var(--surface-cell);
  }
  .mini-cell.sel{background:var(--surface-cell-sel)}
  .mini-cell.conclusion{
    box-shadow:inset 0 0 0 2px var(--c-conclusion);
    color:var(--c-conclusion);
  }
  .mini-cell.assumption{
    box-shadow:inset 0 0 0 2px var(--c-assumption);
    color:var(--c-assumption);
  }
  .mini-cell.deduction{
    box-shadow:inset 0 0 0 2px var(--c-deduction);
    color:var(--c-deduction);
  }
  /* thick cage divider example */
  .mini-cell.cage-r{border-right:2px solid var(--border-cage)}
  .mini-cell.cage-b{border-bottom:2px solid var(--border-cage)}

  h1.title{
    font-size:32px;line-height:36px;font-weight:600;letter-spacing:-.02em;
    margin:0;text-align:center;
  }
  p.body{
    font-size:16px;line-height:24px;color:var(--text-secondary);
    margin:12px 12px 0;text-align:center;
  }

  .dots{
    display:flex;justify-content:center;gap:8px;margin:24px 0 16px;
  }
  .dot{width:7px;height:7px;border-radius:999px;background:var(--text-tertiary);opacity:.35}
  .dot.active{background:var(--brand-600);opacity:1}

  .footer{
    padding:8px 24px max(24px, env(safe-area-inset-bottom)) 24px;flex-shrink:0;
  }
  .btn{
    width:100%;height:50px;border-radius:8px;border:0;
    font-family:inherit;font-size:16px;font-weight:500;
    background:var(--brand-600);color:var(--text-on-brand);cursor:pointer;
    transition:opacity 120ms ease-out;letter-spacing:-.01em;
  }
  .btn:active{opacity:.85}

  .home-indicator{
    width:134px;height:5px;border-radius:3px;background:var(--text-primary);opacity:.9;
    margin:8px auto 0;
  }
</style>
</head>
<body>
  <div class="device">
    <div class="status-bar">
      <span>9:41</span>
      <span class="right">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="5" y="4" width="3" height="8" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M1 4.5C3 2.5 6 1.5 8 1.5s5 1 7 3M3 7c1.5-1.2 3.2-1.7 5-1.7S11.5 5.8 13 7M5.5 9.3C6.2 8.8 7 8.5 8 8.5s1.8.3 2.5.8"/><circle cx="8" cy="10.7" r=".9" fill="currentColor"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x="0.5" y="0.5" width="22" height="11" rx="3" stroke="currentColor" opacity=".5"/><rect x="2" y="2" width="17" height="8" rx="1.5" fill="currentColor"/><rect x="23.5" y="3.5" width="1.5" height="5" rx=".5" fill="currentColor" opacity=".5"/></svg>
      </span>
    </div>

    <div class="nav">
      <span></span>
      <button class="skip" type="button" data-nav="03-home.html">Skip</button>
    </div>

    <div class="page">
      <div class="illus">
        <div class="mini-board">
          <!-- Row 1 -->
          <div class="mini-cell cage-r cage-b">1</div>
          <div class="mini-cell cage-b">2</div>
          <div class="mini-cell cage-b">3</div>
          <!-- Row 2 -->
          <div class="mini-cell cage-r">3</div>
          <div class="mini-cell cage-r conclusion">4</div>
          <div class="mini-cell">1</div>
          <!-- Row 3 -->
          <div class="mini-cell cage-r">2</div>
          <div class="mini-cell">5</div>
          <div class="mini-cell">3</div>
        </div>
      </div>

      <h1 class="title">One rule</h1>
      <p class="body">Each cage holds the numbers from one to its size. Neighbours — including diagonals — can't repeat. Fill the grid using only deduction.</p>

      <div class="dots" role="tablist" aria-label="Page indicator">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>

    <div class="footer">
      <button class="btn" type="button" data-nav="13-tutorial-overlay.html">Continue</button>
    </div>

    <div class="home-indicator"></div>
  </div>
<script>
(function(){
  document.querySelectorAll('[data-nav]').forEach(function(el){
    el.style.cursor = 'pointer';
    el.addEventListener('click', function(ev){
      ev.preventDefault();
      var dest = el.getAttribute('data-nav');
      if (dest) window.location.href = dest;
    });
  });
})();
</script>
</body>
</html>
