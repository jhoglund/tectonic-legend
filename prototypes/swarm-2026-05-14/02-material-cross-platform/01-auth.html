<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Tectonic · Auth · M3</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --brand-600:#0891b2; --brand-500:#06b6d4; --brand-100:#cffafe; --brand-50:#ecfeff;
    --surface:#fafafa; --surface-elevated:#ffffff; --surface-board:#ffffff; --surface-cell:#ffffff;
    --surface-cell-selected:#e0f7fa;
    --border:#e5e5e5; --border-cage:#a3a3a3;
    --text-primary:#0a0a0a; --text-secondary:#525252; --text-tertiary:#a3a3a3; --text-on-brand:#ffffff;
    --success:#10b981; --warning:#f59e0b; --danger:#dc2626;
    --shadow-cell:0 1px 2px rgba(0,0,0,0.04);
    --shadow-card:0 2px 8px rgba(0,0,0,0.06);
    --shadow-modal:0 12px 40px rgba(0,0,0,0.18);
    --easing-emph:cubic-bezier(0.2,0,0,1);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --brand-600:#06b6d4; --brand-500:#22d3ee; --brand-100:#155057; --brand-50:#0e2a30;
      --surface:#0a0a0a; --surface-elevated:#171717; --surface-board:#0f1419; --surface-cell:#1a1f24;
      --surface-cell-selected:#164e5b;
      --border:#2a2a2a; --border-cage:#525252;
      --text-primary:#fafafa; --text-secondary:#a3a3a3; --text-tertiary:#737373; --text-on-brand:#0a0a0a;
      --success:#34d399; --warning:#fbbf24; --danger:#f87171;
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;font-family:'Inter',system-ui,sans-serif;color:var(--text-primary);font-variant-numeric:tabular-nums}
  body{
    min-height:100vh;background:#e4e4e7;display:flex;align-items:center;justify-content:center;padding:24px;
  }
  @media (prefers-color-scheme: dark){ body{background:#050505} }
  .device{
    width:390px;height:844px;background:var(--surface);border-radius:44px;
    box-shadow:0 30px 80px rgba(0,0,0,0.25),0 0 0 1px rgba(0,0,0,0.04);
    overflow:hidden;position:relative;display:flex;flex-direction:column;
  }
  .status-bar{height:54px;display:flex;align-items:center;justify-content:space-between;padding:16px 28px 0;font-size:14px;font-weight:500;letter-spacing:.01em}
  .status-bar .icons{display:flex;gap:6px;align-items:center;color:var(--text-primary)}
  .app-bar{
    height:64px;display:flex;align-items:center;justify-content:center;
    padding:0 16px;position:relative;
  }
  .app-bar h1{margin:0;font-size:18px;font-weight:500;letter-spacing:.01em}
  .content{flex:1;padding:24px 24px 32px;display:flex;flex-direction:column;overflow:auto}
  .hero{
    margin:8px 0 32px;display:flex;flex-direction:column;align-items:center;gap:16px;
  }
  .mark{
    width:64px;height:64px;border-radius:18px;background:var(--brand-100);
    display:grid;place-items:center;color:var(--brand-600);
  }
  .mark svg{width:32px;height:32px}
  .display{font-size:28px;line-height:34px;font-weight:600;letter-spacing:-.01em;margin:0;text-align:center}
  .sub{margin:0;color:var(--text-secondary);font-size:14px;line-height:20px;text-align:center;max-width:280px}
  .btns{display:flex;flex-direction:column;gap:12px;margin-top:8px}
  .btn{
    height:48px;border-radius:8px;border:1px solid var(--border);background:var(--surface-elevated);
    color:var(--text-primary);font:500 15px/1 'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;
    transition:background var(--easing-emph) 200ms;cursor:pointer;
  }
  .btn .icon{width:18px;height:18px;display:grid;place-items:center}
  .btn.filled{background:var(--brand-600);color:var(--text-on-brand);border-color:transparent;font-weight:500}
  .divider{display:flex;align-items:center;gap:12px;color:var(--text-tertiary);font-size:12px;margin:20px 0 12px}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border)}
  .field{
    height:56px;border:1px solid var(--border);border-radius:8px;padding:0 16px;display:flex;align-items:center;
    background:var(--surface-elevated);position:relative;
  }
  .field input{
    border:0;background:transparent;flex:1;outline:none;font:400 15px/1 'Inter',sans-serif;color:var(--text-primary);
    padding-top:14px;
  }
  .field label{
    position:absolute;left:16px;top:18px;font-size:12px;color:var(--text-secondary);pointer-events:none;
    background:var(--surface-elevated);padding:0 4px;transform:translateY(-18px);
  }
  .legal{margin-top:auto;padding-top:24px;text-align:center;color:var(--text-tertiary);font-size:11px;line-height:16px}
  .legal a{color:var(--text-secondary);text-decoration:none;border-bottom:1px solid var(--border)}
  .toggle{
    display:flex;background:var(--surface-elevated);border:1px solid var(--border);border-radius:999px;padding:4px;margin:0 auto 24px;width:fit-content;
  }
  .toggle button{
    border:0;background:transparent;padding:6px 16px;border-radius:999px;font:500 13px/1 'Inter',sans-serif;color:var(--text-secondary);cursor:pointer;
  }
  .toggle button.on{background:var(--brand-100);color:var(--brand-600)}
  .home-ind{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:#0a0a0a;border-radius:3px;opacity:.85}
  @media (prefers-color-scheme: dark){ .home-ind{background:#fafafa;opacity:.55} }
</style>
</head>
<body>
  <div class="device">
    <div class="status-bar">
      <span>9:41</span>
      <span class="icons">
        <svg width="16" height="11" viewBox="0 0 16 11" fill="none"><path d="M1 9l2-2 2 2 2-3 2 3 2-4 2 4 2-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0.5" y="1.5" width="14" height="9" rx="2" stroke="currentColor"/><rect x="2" y="3" width="11" height="6" rx="1" fill="currentColor"/><path d="M16 4v4" stroke="currentColor" stroke-linecap="round"/></svg>
      </span>
    </div>
    <div class="app-bar"><h1>Welcome</h1></div>

    <div class="content">
      <div class="hero">
        <div class="mark">
          <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.6"/><rect x="13" y="3" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.6"/><rect x="3" y="13" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.6"/><rect x="13" y="13" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.6" fill="currentColor" fill-opacity=".18"/></svg>
        </div>
        <h2 class="display">Tectonic</h2>
        <p class="sub">A puzzle that teaches you to think in cages. Five stages, one technique at a time.</p>
      </div>

      <div class="toggle" role="tablist">
        <button class="on">Sign in</button>
        <button>Create account</button>
      </div>

      <div class="btns">
        <button class="btn filled">
          <span class="icon">
            <svg width="18" height="18" viewBox="0 0 18 18"><path fill="currentColor" d="M17.6 9.2c0-.6-.1-1.3-.2-1.9H9v3.6h4.8c-.2 1.1-.8 2-1.8 2.6v2.2h2.9c1.7-1.5 2.7-3.8 2.7-6.5z"/><path fill="currentColor" opacity=".85" d="M9 18c2.4 0 4.5-.8 6-2.2l-2.9-2.2c-.8.5-1.8.9-3.1.9-2.4 0-4.4-1.6-5.2-3.8H.8v2.4C2.3 16 5.4 18 9 18z"/><path fill="currentColor" opacity=".7" d="M3.8 10.7C3.6 10.1 3.5 9.6 3.5 9s.1-1.1.3-1.7V4.9H.8C.3 6.2 0 7.6 0 9s.3 2.8.8 4.1l3-2.4z"/><path fill="currentColor" opacity=".55" d="M9 3.5c1.3 0 2.5.5 3.4 1.3l2.6-2.6C13.5.9 11.4 0 9 0 5.4 0 2.3 2 .8 4.9l3 2.4C4.6 5.1 6.6 3.5 9 3.5z"/></svg>
          </span>
          Continue with Google
        </button>
        <button class="btn">
          <span class="icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16.4 1.4c0 1-.4 2.1-1.1 2.9-.7.8-1.9 1.5-3 1.4-.1-1 .4-2.1 1-2.8.8-.9 2-1.5 3.1-1.5zm3.4 17.1c-.6 1.3-.9 1.9-1.7 3-1.1 1.6-2.6 3.6-4.5 3.6-1.7 0-2.1-1.1-4.4-1.1-2.3 0-2.8 1.1-4.5 1.1-1.9 0-3.4-1.8-4.5-3.4-3-4.4-3.3-9.6-1.5-12.4 1.3-2 3.4-3.2 5.3-3.2 2 0 3.2 1.1 4.8 1.1 1.6 0 2.5-1.1 4.8-1.1 1.7 0 3.6.9 4.9 2.5-4.3 2.4-3.6 8.6.3 9.9z"/></svg>
          </span>
          Continue with Apple
        </button>
      </div>

      <div class="divider">OR</div>

      <div class="btns">
        <div class="field">
          <label>Email</label>
          <input type="email" value="jonas@stixy.com" />
        </div>
        <button class="btn filled">Continue with email</button>
      </div>

      <p class="legal">By continuing you accept the <a href="#">Terms</a> and <a href="#">Privacy</a>.</p>
    </div>
    <div class="home-ind"></div>
  </div>
</body>
</html>
