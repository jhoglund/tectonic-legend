<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tectonic — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --brand-600:#0891b2; --brand-500:#06b6d4; --brand-100:#cffafe; --brand-50:#ecfeff;
    --surface:#fafafa; --surface-elevated:#ffffff; --surface-board:#ffffff;
    --surface-cell:#ffffff; --surface-cell-sel:#e0f7fa;
    --border:#e5e5e5; --border-cage:#a3a3a3;
    --text-primary:#0a0a0a; --text-secondary:#525252; --text-tertiary:#a3a3a3; --text-on-brand:#ffffff;
    --success:#10b981; --warning:#f59e0b; --danger:#dc2626;
    --shadow-card:0 2px 8px rgba(0,0,0,0.06);
    --shadow-modal:0 12px 40px rgba(0,0,0,0.18);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --brand-600:#06b6d4; --brand-500:#22d3ee; --brand-100:#155057; --brand-50:#0e2a30;
      --surface:#0a0a0a; --surface-elevated:#171717; --surface-board:#0f1419;
      --surface-cell:#1a1f24; --surface-cell-sel:#164e5b;
      --border:#2a2a2a; --border-cage:#525252;
      --text-primary:#fafafa; --text-secondary:#a3a3a3; --text-tertiary:#737373; --text-on-brand:#0a0a0a;
      --success:#34d399; --warning:#fbbf24; --danger:#f87171;
    }
  }
  @view-transition { navigation: auto; }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:#e9eaee;
    color:var(--text-primary);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
  }
  @media (prefers-color-scheme: dark){ body{ background:#000 } }
  .device{
    width:390px;min-height:844px;
    background:var(--surface);
    position:relative;overflow:hidden;
    box-shadow:var(--shadow-modal);
    border-radius:44px;
  }
  /* status bar */
  .status-bar{
    height:54px;display:flex;align-items:flex-end;justify-content:space-between;
    padding:0 28px 6px;font-size:15px;font-weight:600;letter-spacing:-.01em;
  }
  .status-bar .right{display:flex;align-items:center;gap:6px}
  .status-bar svg{display:block}

  /* sheet (large detent presentation) */
  .sheet-backdrop{
    position:absolute;inset:0;background:rgba(0,0,0,0.18);
  }
  @media (prefers-color-scheme: dark){ .sheet-backdrop{ background:rgba(0,0,0,0.5) } }
  .sheet{
    position:absolute;left:0;right:0;bottom:0;top:36px;
    background:var(--surface-elevated);
    border-radius:20px 20px 0 0;
    box-shadow:var(--shadow-modal);
    display:flex;flex-direction:column;
    padding-top:8px;
  }
  .grabber{
    width:36px;height:5px;border-radius:999px;
    background:var(--border-cage);opacity:.5;
    margin:6px auto 0;
  }
  .sheet-body{
    flex:1;display:flex;flex-direction:column;
    padding:48px 24px 32px;
  }
  .mark{
    width:64px;height:64px;border-radius:16px;
    background:var(--brand-50);
    display:flex;align-items:center;justify-content:center;
    margin:24px auto 24px;
    border:1px solid var(--border);
  }
  .mark svg{color:var(--brand-600)}
  h1.title{
    font-size:32px;line-height:36px;font-weight:600;letter-spacing:-.02em;
    margin:0;text-align:center;
  }
  p.lede{
    font-size:16px;line-height:24px;color:var(--text-secondary);
    margin:8px 24px 0;text-align:center;
  }
  .spacer{flex:1}
  .actions{display:flex;flex-direction:column;gap:12px}
  .btn{
    height:50px;border-radius:8px;border:0;
    font-family:inherit;font-size:16px;font-weight:500;
    display:flex;align-items:center;justify-content:center;gap:8px;
    cursor:pointer;letter-spacing:-.01em;
    transition:opacity 120ms ease-out;
  }
  .btn:active{opacity:.85}
  .btn-apple{background:#0a0a0a;color:#fafafa}
  @media (prefers-color-scheme: dark){ .btn-apple{ background:#fafafa;color:#0a0a0a } }
  .btn-primary{background:var(--brand-600);color:var(--text-on-brand)}
  .btn-secondary{
    background:transparent;color:var(--text-primary);
    border:1px solid var(--border);
  }
  .text-link{
    background:transparent;border:0;color:var(--brand-600);
    font-family:inherit;font-size:15px;font-weight:500;
    padding:10px;cursor:pointer;text-align:center;
  }
  .divider{
    display:flex;align-items:center;gap:12px;
    color:var(--text-tertiary);font-size:12px;font-weight:500;
    text-transform:uppercase;letter-spacing:.08em;
    margin:8px 0;
  }
  .divider::before,.divider::after{
    content:"";flex:1;height:1px;background:var(--border);
  }
  .footnote{
    font-size:12px;line-height:16px;color:var(--text-tertiary);
    text-align:center;margin:20px 8px 0;
  }
  .footnote a{color:var(--text-secondary);text-decoration:underline}
  .home-indicator{
    position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
    width:134px;height:5px;border-radius:3px;background:var(--text-primary);
    opacity:.9;
  }
  .toggle-row{
    display:flex;align-items:center;justify-content:center;gap:6px;
    font-size:14px;color:var(--text-secondary);
    margin-top:16px;
  }
  .toggle-row button{
    background:none;border:0;color:var(--brand-600);
    font:inherit;font-weight:500;cursor:pointer;padding:4px 2px;
  }
</style>
</head>
<body>
  <div class="device">
    <div class="status-bar">
      <span>9:41</span>
      <span class="right">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="5" y="4" width="3" height="8" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M1 4.5C3 2.5 6 1.5 8 1.5s5 1 7 3M3 7c1.5-1.2 3.2-1.7 5-1.7S11.5 5.8 13 7M5.5 9.3C6.2 8.8 7 8.5 8 8.5s1.8.3 2.5.8"/><circle cx="8" cy="10.7" r=".9" fill="currentColor"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x="0.5" y="0.5" width="22" height="11" rx="3" stroke="currentColor" opacity=".5"/><rect x="2" y="2" width="17" height="8" rx="1.5" fill="currentColor"/><rect x="23.5" y="3.5" width="1.5" height="5" rx=".5" fill="currentColor" opacity=".5"/></svg>
      </span>
    </div>

    <div class="sheet-backdrop"></div>
    <div class="sheet">
      <div class="grabber"></div>
      <div class="sheet-body">
        <div class="mark" aria-hidden="true">
          <!-- abstract Tectonic mark: a 2x2 cage glyph -->
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round">
            <rect x="3" y="3" width="10" height="10" rx="1.5"/>
            <rect x="15" y="3" width="10" height="10" rx="1.5"/>
            <rect x="3" y="15" width="10" height="10" rx="1.5"/>
            <rect x="15" y="15" width="10" height="10" rx="1.5"/>
            <path d="M13 8h2M8 13v2M20 13v2M13 20h2" stroke-linecap="round"/>
          </svg>
        </div>
        <h1 class="title">Welcome to Tectonic</h1>
        <p class="lede">A quiet puzzle that teaches you to think in chains.</p>

        <div class="spacer"></div>

        <div class="actions">
          <button class="btn btn-apple" type="button" data-nav="02-onboarding.html">
            <svg width="17" height="20" viewBox="0 0 17 20" fill="currentColor" aria-hidden="true"><path d="M14.4 10.7c0-2.6 2.1-3.8 2.2-3.9-1.2-1.8-3.1-2-3.7-2-1.6-.2-3 .9-3.8.9-.8 0-2-.9-3.3-.9C4 4.9 2.4 5.9 1.5 7.5c-1.8 3.2-.5 7.9 1.3 10.4.9 1.3 1.9 2.7 3.3 2.6 1.3 0 1.8-.8 3.4-.8 1.6 0 2 .8 3.4.8 1.4 0 2.3-1.3 3.2-2.5 1-1.4 1.4-2.8 1.4-2.9-.1 0-2.7-1-2.7-4.4zM11.8 3.2c.7-.8 1.2-2 1-3.2-1 0-2.2.7-2.9 1.5-.6.7-1.2 1.9-1.1 3 1.1.1 2.3-.6 3-1.3z"/></svg>
            Continue with Apple
          </button>
          <button class="btn btn-secondary" type="button" data-nav="02-onboarding.html">
            <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true"><path fill="#4285F4" d="M17.6 9.2c0-.6-.1-1.2-.2-1.8H9v3.4h4.8c-.2 1.1-.8 2.1-1.8 2.7v2.2h2.9c1.7-1.6 2.7-3.9 2.7-6.5z"/><path fill="#34A853" d="M9 18c2.4 0 4.5-.8 6-2.2l-2.9-2.2c-.8.5-1.8.9-3.1.9-2.4 0-4.4-1.6-5.1-3.8H.9v2.3C2.4 15.9 5.5 18 9 18z"/><path fill="#FBBC05" d="M3.9 10.7c-.2-.5-.3-1.1-.3-1.7s.1-1.2.3-1.7V5H.9C.3 6.2 0 7.5 0 9s.3 2.8.9 4l3-2.3z"/><path fill="#EA4335" d="M9 3.6c1.3 0 2.5.5 3.5 1.4l2.6-2.6C13.5.9 11.4 0 9 0 5.5 0 2.4 2.1.9 5l3 2.3C4.6 5.2 6.6 3.6 9 3.6z"/></svg>
            Continue with Google
          </button>
          <button class="btn btn-secondary" type="button" data-nav="02-onboarding.html">
            <svg width="18" height="14" viewBox="0 0 18 14" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true"><rect x="1" y="1" width="16" height="12" rx="2"/><path d="M1 3l8 5 8-5"/></svg>
            Continue with email
          </button>
        </div>

        <div class="toggle-row">
          New to Tectonic? <button type="button">Create account</button>
        </div>

        <p class="footnote">
          By continuing you agree to the <a href="#">Terms</a> and <a href="#">Privacy</a>. We don't sell your data and we don't track you across the web.
        </p>
      </div>
    </div>
    <div class="home-indicator"></div>
  </div>
<script>
(function(){
  document.querySelectorAll('[data-nav]').forEach(function(el){
    el.style.cursor = 'pointer';
    el.addEventListener('click', function(ev){
      ev.preventDefault();
      var dest = el.getAttribute('data-nav');
      if (dest) window.location.href = dest;
    });
  });
})();
</script>
</body>
</html>
