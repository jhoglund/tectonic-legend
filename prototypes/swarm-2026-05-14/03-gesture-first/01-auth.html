<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Tectonic — Auth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --brand-600:#0891b2; --brand-500:#06b6d4; --brand-100:#cffafe; --brand-50:#ecfeff;
    --surface:#fafafa; --surface-elevated:#ffffff; --surface-board:#ffffff; --surface-cell:#ffffff;
    --surface-cell-selected:#e0f7fa; --border:#e5e5e5; --border-cage:#a3a3a3;
    --text-primary:#0a0a0a; --text-secondary:#525252; --text-tertiary:#a3a3a3; --text-on-brand:#ffffff;
    --success:#10b981; --warning:#f59e0b; --danger:#dc2626;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --brand-600:#06b6d4; --brand-500:#22d3ee; --brand-100:#155057; --brand-50:#0e2a30;
      --surface:#0a0a0a; --surface-elevated:#171717; --surface-board:#0f1419; --surface-cell:#1a1f24;
      --surface-cell-selected:#164e5b; --border:#2a2a2a; --border-cage:#525252;
      --text-primary:#fafafa; --text-secondary:#a3a3a3; --text-tertiary:#737373; --text-on-brand:#0a0a0a;
      --success:#34d399; --warning:#fbbf24; --danger:#f87171;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #2a2a2a;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .device {
    width: 390px; height: 844px;
    background: var(--surface);
    position: relative; overflow: hidden;
    border-radius: 40px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.18);
  }
  .safe-top { height: 54px; }
  .safe-bottom { height: 34px; display: flex; align-items: center; justify-content: center; }
  .home-indicator { width: 134px; height: 5px; background: var(--text-primary); opacity: 0.35; border-radius: 999px; }

  .stage {
    height: calc(100% - 88px);
    display: flex; flex-direction: column;
    padding: 0 32px;
  }
  .wordmark {
    margin-top: 24px;
    font-size: 14px; font-weight: 500; letter-spacing: 0.04em;
    color: var(--text-secondary);
  }
  .wordmark .dot { color: var(--brand-600); }

  .center {
    flex: 1;
    display: flex; flex-direction: column;
    justify-content: center;
    gap: 12px;
  }
  .lede {
    font-size: 32px; line-height: 36px; font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    margin-bottom: 8px;
  }
  .lede em { font-style: normal; color: var(--text-tertiary); font-weight: 400; }
  .sub {
    font-size: 14px; line-height: 20px; color: var(--text-secondary);
    margin-bottom: 40px;
    max-width: 280px;
  }

  .actions { display: flex; flex-direction: column; gap: 12px; }
  .btn {
    height: 56px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface-elevated);
    color: var(--text-primary);
    font-family: inherit; font-size: 16px; font-weight: 500;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    cursor: pointer;
    transition: transform 120ms ease-out;
  }
  .btn.primary {
    background: var(--text-primary);
    color: var(--surface);
    border-color: var(--text-primary);
  }
  .btn .ic { width: 18px; height: 18px; }

  .toggle-row {
    margin-top: 32px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-size: 13px; color: var(--text-tertiary);
  }
  .toggle-row .chev { display: inline-flex; flex-direction: column; gap: 1px; opacity: 0.6; }
  .toggle-row .chev span { width: 16px; height: 1px; background: currentColor; }
  .toggle-row strong { color: var(--text-secondary); font-weight: 500; }

  .annot {
    position: absolute;
    font-size: 11px; line-height: 16px;
    color: var(--brand-600);
    font-weight: 500;
    letter-spacing: 0.02em;
    pointer-events: none;
  }
  .annot.tr { top: 16px; right: 16px; text-align: right; }
  .annot.bl { bottom: 50px; left: 24px; }
  .annot::before { content: ""; display: inline-block; width: 14px; height: 1px; background: var(--brand-600); vertical-align: middle; margin-right: 6px; opacity: 0.5; }

  .ghost-hint {
    position: absolute;
    left: 50%; transform: translateX(-50%);
    bottom: 120px;
    font-size: 12px; color: var(--text-tertiary);
    display: flex; align-items: center; gap: 8px;
  }
  .ghost-hint .arrow { width: 14px; height: 14px; opacity: 0.5; }
</style>
</head>
<body>
  <div class="device">
    <div class="safe-top"></div>
    <div class="stage">
      <div class="wordmark">Tectonic<span class="dot">.</span></div>
      <div class="center">
        <div class="lede">Quiet puzzles.<br><em>Learn by playing.</em></div>
        <div class="sub">A guided journey from naked singles to contradiction chains. No timers, no streaks unless you want them.</div>
        <div class="actions">
          <button class="btn primary">
            <svg class="ic" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16.4 13.6c0-2.6 2.1-3.8 2.2-3.9-1.2-1.7-3-2-3.7-2-1.6-.2-3 .9-3.8.9s-2-.9-3.3-.9c-1.7 0-3.3 1-4.2 2.5-1.8 3.1-.5 7.7 1.3 10.3.9 1.2 1.9 2.7 3.3 2.6 1.3-.1 1.8-.9 3.4-.9s2 .9 3.3.8c1.4 0 2.3-1.3 3.1-2.6.7-.9 1.1-1.9 1.4-2.8-2-.7-2.8-2.7-2.8-3.9zM13.8 4.4c.7-.9 1.2-2.1 1.1-3.4-1 0-2.3.7-3 1.5-.7.8-1.3 2-1.1 3.2 1.1.1 2.2-.5 3-1.3z"/></svg>
            Continue with Apple
          </button>
          <button class="btn">
            <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22 12.2c0-.8-.1-1.4-.2-2H12v3.8h5.6c-.1.9-.8 2.3-2.2 3.3l-.02.1 3.2 2.5.2.02C20.8 18 22 15.4 22 12.2z"/><path fill="#34A853" d="M12 22c2.9 0 5.3-.9 7-2.6L15.6 17c-.9.6-2.1 1.1-3.6 1.1-2.8 0-5.1-1.8-5.9-4.3l-.1.01-3.3 2.6-.04.1C4.2 19.6 7.8 22 12 22z"/><path fill="#FBBC05" d="M6.1 13.7c-.2-.6-.3-1.3-.3-2s.1-1.4.3-2L6 9.6 2.7 7c-.7 1.4-1.1 3-1.1 4.7s.4 3.3 1.1 4.7l3.4-2.7z"/><path fill="#EA4335" d="M12 5.6c2 0 3.3.9 4.1 1.6L19 4.4C17.2 2.7 14.9 1.6 12 1.6 7.8 1.6 4.2 4 2.7 7.3l3.4 2.7C7 7.4 9.3 5.6 12 5.6z"/></svg>
            Continue with Google
          </button>
          <button class="btn">Continue with email</button>
          <button class="btn" style="background:transparent;border-color:transparent;color:var(--text-tertiary);font-weight:400;">Continue as guest</button>
        </div>
        <div class="toggle-row">
          <span class="chev"><span></span><span></span><span></span></span>
          <span>Already have an account? <strong>Swipe up to sign in</strong></span>
          <span class="chev"><span></span><span></span><span></span></span>
        </div>
      </div>
    </div>
    <div class="safe-bottom"><div class="home-indicator"></div></div>
    <div class="annot tr">swipe down from corner<br>→ settings</div>
    <div class="annot bl">swipe up → sign in mode</div>
  </div>
</body>
</html>
