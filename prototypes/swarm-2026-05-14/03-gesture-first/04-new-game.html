<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Tectonic — New game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --brand-600:#0891b2; --brand-500:#06b6d4; --brand-100:#cffafe; --brand-50:#ecfeff;
    --surface:#fafafa; --surface-elevated:#ffffff; --surface-board:#ffffff; --surface-cell:#ffffff;
    --surface-cell-selected:#e0f7fa; --border:#e5e5e5; --border-cage:#a3a3a3;
    --text-primary:#0a0a0a; --text-secondary:#525252; --text-tertiary:#a3a3a3; --text-on-brand:#ffffff;
    --success:#10b981; --warning:#f59e0b; --danger:#dc2626;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --brand-600:#06b6d4; --brand-500:#22d3ee; --brand-100:#155057; --brand-50:#0e2a30;
      --surface:#0a0a0a; --surface-elevated:#171717; --surface-board:#0f1419; --surface-cell:#1a1f24;
      --surface-cell-selected:#164e5b; --border:#2a2a2a; --border-cage:#525252;
      --text-primary:#fafafa; --text-secondary:#a3a3a3; --text-tertiary:#737373; --text-on-brand:#0a0a0a;
      --success:#34d399; --warning:#fbbf24; --danger:#f87171;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #2a2a2a;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .device {
    width: 390px; height: 844px;
    background: var(--surface);
    position: relative; overflow: hidden;
    border-radius: 40px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.18);
  }
  .safe-top { height: 54px; }
  .safe-bottom { position: absolute; bottom: 0; left: 0; right: 0; height: 34px; display: flex; align-items: center; justify-content: center; }
  .home-indicator { width: 134px; height: 5px; background: var(--text-primary); opacity: 0.35; border-radius: 999px; }

  .pager {
    height: calc(100% - 88px);
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    display: flex;
    scrollbar-width: none;
  }
  .pager::-webkit-scrollbar { display: none; }

  .page {
    flex: 0 0 100%;
    height: 100%;
    scroll-snap-align: start;
    padding: 16px 32px 32px;
    display: flex; flex-direction: column;
    position: relative;
  }

  .ord {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-tertiary);
    letter-spacing: 0.04em;
    display: flex; gap: 4px; align-items: center;
    margin-bottom: 32px;
  }
  .ord .num { color: var(--text-primary); font-weight: 500; }
  .ord .sep { opacity: 0.5; }

  .title-block { margin-bottom: 24px; }
  .difficulty {
    font-size: 32px; line-height: 36px; font-weight: 500;
    letter-spacing: -0.02em; color: var(--text-primary);
    margin-bottom: 8px;
  }
  .technique {
    font-size: 14px; line-height: 20px; color: var(--text-secondary);
  }

  .stat-row { display: flex; gap: 24px; margin-bottom: 24px; }
  .stat { }
  .stat .v { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 500; color: var(--text-primary); }
  .stat .l { font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-tertiary); margin-top: 2px; }

  .preview {
    width: 100%;
    aspect-ratio: 1/1;
    background: var(--surface-board);
    border: 2px solid var(--border-cage);
    border-radius: 12px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(5, 1fr);
    margin-bottom: 24px;
    position: relative;
  }
  .preview .c {
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
  }
  .preview .c.cr { border-right: 2px solid var(--border-cage); }
  .preview .c.cb { border-bottom: 2px solid var(--border-cage); }
  .preview .c.empty { color: transparent; }

  .preview.locked::after {
    content: "";
    position: absolute; inset: 0;
    background: var(--surface);
    opacity: 0.7;
    border-radius: 10px;
  }
  .lock-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px;
    z-index: 1;
  }
  .lock-overlay .ic {
    width: 24px; height: 24px;
    color: var(--text-secondary);
  }
  .lock-overlay .msg {
    font-size: 13px; color: var(--text-primary);
    text-align: center; max-width: 220px; line-height: 18px;
  }
  .lock-overlay .tech {
    font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--text-tertiary); font-weight: 500;
  }

  .cta {
    margin-top: auto;
    background: var(--text-primary);
    color: var(--surface);
    height: 52px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 500; font-size: 15px;
    border: none; font-family: inherit;
    cursor: pointer;
  }
  .cta.locked {
    background: var(--surface-elevated);
    color: var(--text-tertiary);
    border: 1px solid var(--border);
    font-weight: 400;
  }

  .dots {
    position: absolute;
    bottom: 100px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px;
    z-index: 2;
  }
  .dots i {
    width: 5px; height: 5px; border-radius: 999px;
    background: var(--text-tertiary); opacity: 0.4;
  }
  .dots i.active { background: var(--text-primary); opacity: 1; width: 18px; border-radius: 999px; }

  .annot {
    position: absolute;
    font-size: 11px;
    color: var(--brand-600);
    font-weight: 500;
    pointer-events: none;
  }
  .annot::before { content: ""; display: inline-block; width: 14px; height: 1px; background: var(--brand-600); vertical-align: middle; margin-right: 6px; opacity: 0.5; }
  .annot.tr { top: 18px; right: 24px; }
  .annot.tl { top: 18px; left: 24px; }
</style>
</head>
<body>
  <div class="device">
    <div class="safe-top"></div>
    <div class="pager">
      <div class="page">
        <div class="ord"><span class="num">03</span><span class="sep">/</span><span>05</span><span class="sep">·</span><span>medium</span></div>
        <div class="title-block">
          <div class="difficulty">Medium</div>
          <div class="technique">Hidden singles · 5×5 · ~12 min</div>
        </div>
        <div class="stat-row">
          <div class="stat"><div class="v">04:12</div><div class="l">Best</div></div>
          <div class="stat"><div class="v">07:08</div><div class="l">Average</div></div>
          <div class="stat"><div class="v">23</div><div class="l">Solved</div></div>
        </div>
        <div class="preview">
          <div class="c cr cb">3</div><div class="c cb">·</div><div class="c cr cb empty">·</div><div class="c cb">2</div><div class="c cb">·</div>
          <div class="c cr">·</div><div class="c cb cr">1</div><div class="c">·</div><div class="c cr cb">4</div><div class="c">·</div>
          <div class="c cr cb">·</div><div class="c">3</div><div class="c cb cr">·</div><div class="c">·</div><div class="c cb">5</div>
          <div class="c">2</div><div class="c cr cb">·</div><div class="c">·</div><div class="c cr cb">·</div><div class="c">1</div>
          <div class="c">·</div><div class="c">4</div><div class="c">·</div><div class="c">3</div><div class="c">·</div>
        </div>
        <button class="cta">Begin · medium</button>
        <div class="dots"><i></i><i></i><i class="active"></i><i></i><i></i></div>
      </div>
      <!-- additional pages prerendered behind first via dots only; reviewer sees first page -->
    </div>
    <div class="safe-bottom"><div class="home-indicator"></div></div>

    <div class="annot tl">← swipe right = back home</div>
    <div class="annot tr">swipe between difficulties →</div>
  </div>
</body>
</html>
