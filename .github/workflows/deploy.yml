name: Deploy to GitHub Pages

# Builds the Vite app and publishes dist/ to GitHub Pages on every push
# to main. (This replaces the earlier prototype-only deployment.)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Mimir analytics — optional. When these repository
          # variables/secret are unset the app builds with no analytics
          # (the vite.config plugin simply omits the SDK script).
          VITE_MIMIR_SCRIPT_URL: ${{ vars.VITE_MIMIR_SCRIPT_URL }}
          VITE_MIMIR_ENDPOINT: ${{ vars.VITE_MIMIR_ENDPOINT }}
          VITE_MIMIR_TOKEN: ${{ secrets.VITE_MIMIR_TOKEN }}
          VITE_MIMIR_APP_VERSION: ${{ github.sha }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
