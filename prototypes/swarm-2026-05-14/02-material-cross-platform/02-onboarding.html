<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Tectonic · Onboarding · M3</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --brand-600:#0891b2; --brand-500:#06b6d4; --brand-100:#cffafe; --brand-50:#ecfeff;
    --surface:#fafafa; --surface-elevated:#ffffff; --surface-board:#ffffff; --surface-cell:#ffffff;
    --surface-cell-selected:#e0f7fa;
    --border:#e5e5e5; --border-cage:#a3a3a3;
    --text-primary:#0a0a0a; --text-secondary:#525252; --text-tertiary:#a3a3a3; --text-on-brand:#ffffff;
    --success:#10b981; --warning:#f59e0b; --danger:#dc2626;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --brand-600:#06b6d4; --brand-500:#22d3ee; --brand-100:#155057; --brand-50:#0e2a30;
      --surface:#0a0a0a; --surface-elevated:#171717; --surface-board:#0f1419; --surface-cell:#1a1f24;
      --surface-cell-selected:#164e5b;
      --border:#2a2a2a; --border-cage:#525252;
      --text-primary:#fafafa; --text-secondary:#a3a3a3; --text-tertiary:#737373; --text-on-brand:#0a0a0a;
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;font-family:'Inter',system-ui,sans-serif;color:var(--text-primary);font-variant-numeric:tabular-nums}
  body{min-height:100vh;background:#e4e4e7;display:flex;align-items:center;justify-content:center;padding:24px}
  @media (prefers-color-scheme: dark){ body{background:#050505} }
  .device{width:390px;height:844px;background:var(--surface);border-radius:44px;box-shadow:0 30px 80px rgba(0,0,0,0.25),0 0 0 1px rgba(0,0,0,0.04);overflow:hidden;position:relative;display:flex;flex-direction:column}
  .status-bar{height:54px;display:flex;align-items:center;justify-content:space-between;padding:16px 28px 0;font-size:14px;font-weight:500}
  .app-bar{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 8px 0 4px}
  .app-bar .iconbtn{width:48px;height:48px;display:grid;place-items:center;color:var(--text-primary);background:transparent;border:0;cursor:pointer}
  .app-bar h1{margin:0;font-size:14px;font-weight:500;color:var(--text-secondary);letter-spacing:.04em;text-transform:uppercase}
  .content{flex:1;padding:8px 24px 0;display:flex;flex-direction:column;overflow:hidden}
  .pager{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:24px}
  .illus{
    width:280px;height:280px;background:var(--brand-100);border-radius:20px;display:grid;place-items:center;
  }
  .grid-illus{display:grid;grid-template-columns:repeat(5,40px);grid-template-rows:repeat(5,40px);gap:0;background:var(--surface-board);border-radius:10px;padding:6px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
  .grid-illus .c{
    border:1px solid var(--border);
    display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:18px;color:var(--text-primary);
    font-variant-numeric:tabular-nums;background:var(--surface-cell);
  }
  .grid-illus .c.cage-r{border-right-color:var(--border-cage);border-right-width:2px}
  .grid-illus .c.cage-b{border-bottom-color:var(--border-cage);border-bottom-width:2px}
  .grid-illus .c.sel{background:var(--surface-cell-selected);color:var(--brand-600);font-weight:500}
  .heading{margin:0;font-size:24px;line-height:30px;font-weight:600;letter-spacing:-.01em}
  .body{margin:0;font-size:15px;line-height:22px;color:var(--text-secondary);max-width:300px}
  .dots{display:flex;gap:8px;justify-content:center;padding:24px 0}
  .dot{width:8px;height:8px;border-radius:999px;background:var(--border)}
  .dot.on{background:var(--brand-600);width:24px}
  .footer{padding:0 24px 24px;display:flex;justify-content:space-between;align-items:center;gap:12px}
  .skip{background:transparent;border:0;color:var(--text-secondary);font:500 14px/1 'Inter';padding:14px 12px;cursor:pointer}
  .fab{
    height:56px;padding:0 24px;border-radius:16px;background:var(--brand-600);color:var(--text-on-brand);
    border:0;font:500 15px/1 'Inter';display:flex;align-items:center;gap:10px;cursor:pointer;
    box-shadow:0 3px 8px rgba(8,145,178,.25);
  }
  .home-ind{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:#0a0a0a;border-radius:3px;opacity:.85}
  @media (prefers-color-scheme: dark){ .home-ind{background:#fafafa;opacity:.55} }
</style>
</head>
<body>
  <div class="device">
    <div class="status-bar"><span>9:41</span><span></span></div>
    <div class="app-bar">
      <button class="iconbtn" aria-label="Close">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
      <h1>Step 2 of 3</h1>
      <span style="width:48px"></span>
    </div>

    <div class="content">
      <div class="pager">
        <div class="illus">
          <div class="grid-illus">
            <!-- 5x5 mini board, showing a cage with selection -->
            <div class="c cage-r cage-b">1</div>
            <div class="c cage-b">2</div>
            <div class="c cage-r cage-b">3</div>
            <div class="c sel cage-b">4</div>
            <div class="c cage-b">5</div>

            <div class="c cage-r cage-b">2</div>
            <div class="c cage-r cage-b">4</div>
            <div class="c cage-b">1</div>
            <div class="c sel cage-b">5</div>
            <div class="c cage-b">3</div>

            <div class="c cage-r cage-b">5</div>
            <div class="c cage-b">3</div>
            <div class="c cage-r cage-b">2</div>
            <div class="c cage-b sel">1</div>
            <div class="c cage-b">4</div>

            <div class="c cage-r cage-b">3</div>
            <div class="c cage-r cage-b">1</div>
            <div class="c cage-b">5</div>
            <div class="c cage-b">2</div>
            <div class="c cage-b">&nbsp;</div>

            <div class="c cage-r">4</div>
            <div class="c cage-r">5</div>
            <div class="c">&nbsp;</div>
            <div class="c">3</div>
            <div class="c">1</div>
          </div>
        </div>
        <h2 class="heading">A cage holds each number once</h2>
        <p class="body">Cages are the outlined groups. Inside a cage of five, the numbers 1–5 each appear exactly once. Same for cages of two, three, four.</p>
      </div>
      <div class="dots">
        <span class="dot"></span><span class="dot on"></span><span class="dot"></span>
      </div>
    </div>
    <div class="footer">
      <button class="skip">Skip tour</button>
      <button class="fab">
        Next
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 5l7 7-7 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div class="home-ind"></div>
  </div>
</body>
</html>
