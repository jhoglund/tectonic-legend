<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tectonic · Variant 01 — iOS-native reviewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --brand-600:#0891b2;--brand-50:#ecfeff;
    --surface:#fafafa;--surface-elevated:#ffffff;
    --border:#e5e5e5;
    --text-primary:#0a0a0a;--text-secondary:#525252;--text-tertiary:#a3a3a3;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --brand-600:#06b6d4;--brand-50:#0e2a30;
      --surface:#0a0a0a;--surface-elevated:#171717;
      --border:#2a2a2a;
      --text-primary:#fafafa;--text-secondary:#a3a3a3;--text-tertiary:#737373;
    }
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--surface);color:var(--text-primary);
    -webkit-font-smoothing:antialiased;
    display:grid;grid-template-columns:240px 1fr;
    min-height:100vh;
  }

  /* Sidebar nav */
  aside{
    background:var(--surface-elevated);
    border-right:1px solid var(--border);
    padding:24px 16px;
    position:sticky;top:0;
    height:100vh;overflow:auto;
    display:flex;flex-direction:column;gap:4px;
  }
  .brand{
    display:flex;align-items:center;gap:10px;
    padding:4px 8px 16px;margin-bottom:8px;
    border-bottom:1px solid var(--border);
  }
  .brand .mark{
    width:32px;height:32px;border-radius:8px;background:var(--brand-50);
    color:var(--brand-600);display:flex;align-items:center;justify-content:center;
  }
  .brand .t{font-size:15px;font-weight:600;letter-spacing:-.01em}
  .brand .s{font-size:11px;color:var(--text-secondary);font-variant-numeric:tabular-nums}
  .eyebrow{
    font-size:11px;font-weight:600;color:var(--text-tertiary);
    text-transform:uppercase;letter-spacing:.08em;
    padding:8px 8px 4px;
  }
  nav button{
    width:100%;text-align:left;
    background:transparent;border:0;
    font:inherit;font-size:14px;font-weight:500;
    color:var(--text-secondary);
    padding:9px 12px;border-radius:8px;
    display:flex;align-items:center;gap:10px;
    cursor:pointer;
    transition:background 120ms ease-out, color 120ms ease-out;
  }
  nav button:hover{background:var(--surface);color:var(--text-primary)}
  nav button.active{
    background:var(--brand-50);color:var(--brand-600);font-weight:600;
  }
  nav button .num{
    font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;
    font-size:11px;color:var(--text-tertiary);
    width:18px;
  }
  nav button.active .num{color:var(--brand-600)}

  .foot{
    margin-top:auto;padding:16px 8px 8px;
    font-size:11px;color:var(--text-tertiary);line-height:16px;
  }
  .foot a{color:var(--text-secondary);text-decoration:underline}

  /* Stage area */
  main{
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    padding:24px;gap:16px;
    background:
      radial-gradient(60% 60% at 50% 30%, rgba(8,145,178,0.05), transparent 70%),
      var(--surface);
  }
  .frame-wrap{
    width:390px;height:844px;
    border-radius:44px;
    box-shadow:0 24px 64px rgba(0,0,0,0.22), 0 2px 8px rgba(0,0,0,0.08);
    background:#000;
    overflow:hidden;
    position:relative;
  }
  iframe{
    width:100%;height:100%;border:0;display:block;
  }
  .label{
    font-size:13px;color:var(--text-secondary);
    font-variant-numeric:tabular-nums;
    display:flex;align-items:center;gap:8px;
  }
  .label code{
    font-family:'JetBrains Mono',monospace;font-size:12px;
    color:var(--text-primary);background:var(--surface-elevated);
    padding:2px 6px;border-radius:4px;border:1px solid var(--border);
  }
</style>
</head>
<body>
  <aside>
    <div class="brand">
      <div class="mark" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><rect x="3" y="3" width="10" height="10" rx="1.5"/><rect x="15" y="3" width="10" height="10" rx="1.5"/><rect x="3" y="15" width="10" height="10" rx="1.5"/><rect x="15" y="15" width="10" height="10" rx="1.5"/></svg>
      </div>
      <div>
        <div class="t">Tectonic</div>
        <div class="s">Variant 01 · iOS-native</div>
      </div>
    </div>

    <div class="eyebrow">Screens</div>
    <nav id="nav">
      <button class="active" data-src="01-auth.html"><span class="num">01</span>Auth</button>
      <button data-src="02-onboarding.html"><span class="num">02</span>Onboarding</button>
      <button data-src="03-home.html"><span class="num">03</span>Home</button>
      <button data-src="04-new-game.html"><span class="num">04</span>New game</button>
      <button data-src="05-solving.html"><span class="num">05</span>Solving</button>
      <button data-src="05a-solving-fresh.html"><span class="num">5a</span>Solving · Fresh</button>
      <button data-src="05b-cell-selected.html"><span class="num">5b</span>Solving · Cell selected</button>
      <button data-src="05c-notes-mode.html"><span class="num">5c</span>Solving · Notes mode</button>
      <button data-src="05d-conflict.html"><span class="num">5d</span>Solving · Conflict</button>
      <button data-src="05e-basic-hint.html"><span class="num">5e</span>Solving · Basic hint</button>
      <button data-src="05f-pause.html"><span class="num">5f</span>Solving · Pause</button>
      <button data-src="05g-abandon-confirm.html"><span class="num">5g</span>Solving · Abandon confirm</button>
      <button data-src="06-solved.html"><span class="num">06</span>Solved</button>
      <button data-src="07-stats.html"><span class="num">07</span>Stats</button>
      <button data-src="08-stage-up.html"><span class="num">08</span>Stage up</button>
      <button data-src="09-paywall-hard-tap.html"><span class="num">09</span>Paywall · Hard tap</button>
      <button data-src="10-paywall-contradiction.html"><span class="num">10</span>Paywall · Contradiction</button>
      <button data-src="11-settings.html"><span class="num">11</span>Settings</button>
      <button data-src="12-settings-account.html"><span class="num">12</span>Settings · Account</button>
      <button data-src="13-tutorial-overlay.html"><span class="num">13</span>Tutorial · Overlay</button>
      <button data-src="14-mastery-moment.html"><span class="num">14</span>Mastery moment</button>
      <button data-src="15-post-solve-mastery.html"><span class="num">15</span>Solved · Mastery crossed</button>
      <button data-src="16-re-entry.html"><span class="num">16</span>Re-entry · after lapse</button>
      <button data-src="17-share-sheet.html"><span class="num">17</span>Share sheet</button>
      <button data-src="18-practice.html"><span class="num">18</span>Practice</button>
    </nav>

    <div class="foot">
      390 × 844 portrait. Light mode is the default; preview in macOS dark mode to see the dark-mode variant. See <a href="STATUS.md">STATUS.md</a> for direction notes.
    </div>
  </aside>

  <main>
    <div class="frame-wrap">
      <iframe id="frame" src="01-auth.html" title="Variant 01 screen preview"></iframe>
    </div>
    <div class="label">
      <span id="label-title">Auth</span>
      <code id="label-src">01-auth.html</code>
    </div>
  </main>

  <script>
    (function(){
      var nav = document.getElementById('nav');
      var frame = document.getElementById('frame');
      var labelTitle = document.getElementById('label-title');
      var labelSrc = document.getElementById('label-src');
      nav.addEventListener('click', function(e){
        var btn = e.target.closest('button');
        if(!btn || !btn.dataset.src) return;
        nav.querySelectorAll('button').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        var src = btn.dataset.src;
        frame.src = src;
        labelSrc.textContent = src;
        labelTitle.textContent = btn.textContent.replace(/^\d+/, '').trim();
      });

      // Keyboard arrow nav between screens
      document.addEventListener('keydown', function(e){
        if(e.key !== 'ArrowDown' && e.key !== 'ArrowUp' && e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
        var buttons = Array.prototype.slice.call(nav.querySelectorAll('button'));
        var idx = buttons.findIndex(function(b){ return b.classList.contains('active'); });
        if(idx === -1) return;
        var delta = (e.key === 'ArrowDown' || e.key === 'ArrowRight') ? 1 : -1;
        var next = (idx + delta + buttons.length) % buttons.length;
        buttons[next].click();
      });
    })();
  </script>
</body>
</html>
